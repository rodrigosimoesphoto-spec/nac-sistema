.kpi.accent .kpi-l{color:rgba(255,255,255,.55)}.kpi-t{font-size:11px;color:#9CA3AF;margin-top:2px}

.progress{height:5px;background:#E8EBF5;border-radius:3px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.week-grid{display:grid;gap:12px;margin-bottom:14px}
@media(max-width:768px){.week-grid{grid-template-columns:1fr !important}}
.week-col{background:#fff;border:1px solid #D4D9ED;border-radius:12px;overflow:hidden}
.week-col.today{border:2px solid #002B7F;box-shadow:0 4px 16px rgba(0,43,127,.12)}
.week-col-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.week-col.today .week-col-head{background:#002B7F}
.week-col:not(.today) .week-col-head{background:#F7F8FC;border-bottom:1px solid #E8EBF5}
.week-day-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800}
.week-col.today .week-day-name{color:#fff}

.week-task{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#F7F8FC;border:1px solid #E8EBF5;border-radius:8px;cursor:pointer;margin-bottom:8px}

.week-add{display:flex;align-items:center;gap:6px;padding:8px 10px;color:#9CA3AF;font-size:12px;font-weight:600;cursor:pointer;border-top:1px solid #E8EBF5}
.sec-title{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:800;color:#111827;margin-bottom:14px}
.sec-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.empty{text-align:center;padding:28px 16px;color:#9CA3AF;font-size:12px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
@media(max-width:600px){.modal-ov{align-items:flex-end;padding:0}}
.modal-ov.open{display:flex}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
@media(max-width:600px){.modal-box{border-radius:16px 16px 0 0;max-height:92vh}}
.modal-head{background:#002B7F;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;border-radius:14px 14px 0 0}
@media(max-width:600px){.modal-head{border-radius:16px 16px 0 0}}
.modal-title-el{color:#fff;font-size:14px;font-weight:700}
.modal-close-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.modal-form{padding:16px;display:flex;flex-direction:column;gap:12px;flex:1}
.modal-foot{padding:12px 16px;border-top:1px solid #D4D9ED;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:10px;font-weight:700;color:#4B5563;text-transform:uppercase;letter-spacing:.5px}
.finp,.fsel,.ftxt{width:100%;padding:10px 12px;border:1.5px solid #D4D9ED;border-radius:8px;font-size:14px;color:#111827;background:#fff;outline:none}
@media(max-width:600px){.finp,.fsel,.ftxt{font-size:16px}}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:#002B7F}
.ftxt{resize:vertical;min-height:80px;line-height:1.5;font-family:'Inter',sans-serif}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:500px){.frow,.frow3{grid-template-columns:1fr}}
.ai-msgs{padding:14px;display:flex;flex-direction:column;gap:10px;height:380px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ai-msg{max-width:85%;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.6}
.ai-msg.bot{background:#E8EDF8;align-self:flex-start;color:#111827}
.ai-msg.user{background:#002B7F;color:#fff;align-self:flex-end}
.ai-msg.thinking{background:#F7F8FC;color:#9CA3AF;font-style:italic;align-self:flex-start}
.ai-row{border-top:1px solid #D4D9ED;padding:12px 14px;display:flex;gap:8px;align-items:flex-end}
.ai-inp{flex:1;border:1.5px solid #D4D9ED;border-radius:8px;padding:10px 12px;font-size:14px;color:#111827;background:#fff;outline:none;resize:none;min-height:40px;max-height:100px;font-family:'Inter',sans-serif;line-height:1.4}
.ai-inp:focus{border-color:#002B7F}
.ai-send{background:#002B7F;color:#fff;border:none;border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0}
.ai-send:disabled{opacity:.4}
.qbtn{text-align:left;padding:10px 14px;background:#F7F8FC;border:1px solid #D4D9ED;border-radius:8px;font-size:13px;color:#111827;cursor:pointer;font-family:'Inter',sans-serif;width:100%;display:block;margin-bottom:8px}
.toast-el{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;z-index:500;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;pointer-events:none}
@media(min-width:769px){.toast-el{bottom:20px}}
</style>
</head>
<body>

      <span class="modal-title-el" id="modal-title-el">Novo</span>
      <button class="modal-close-btn" id="modal-close-btn">x</button>
    </div>
    <div class="modal-form" id="modal-form"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>
<div class="toast-el" id="the-toast"></div>
<script>
var SB='https://syuqwuqkbkqpysugltky.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dXF3dXFrYmtxcHlzdWdsdGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNTc5MDUsImV4cCI6MjA5OTYzMzkwNX0.gh_wA901Mos_8Sot_hSf9Uu1zm_1IQSzcnJVPFLskrM';
var EDGE='https://syuqwuqkbkqpysugltky.supabase.co/functions/v1/nac-ia';
var SBH={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

var db={
  get:function(t,p){if(!p)p='';return fetch(SB+'/rest/v1/'+t+'?'+p,{headers:SBH}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});},
  post:function(t,d){return fetch(SB+'/rest/v1/'+t,{method:'POST',headers:SBH,body:JSON.stringify(d)}).then(function(r){if(!r.ok)return r.text().then(function(e){throw new Error(e);});return r.json();});},
  patch:function(t,id,d){return fetch(SB+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:SBH,body:JSON.stringify(d)}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});},
  del:function(t,id){return fetch(SB+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:SBH}).then(function(r){if(!r.ok)throw new Error(r.status);});},
  ups:function(t,d){var h=Object.assign({},SBH,{'Prefer':'resolution=merge-duplicates,return=representation'});return fetch(SB+'/rest/v1/'+t,{method:'POST',headers:h,body:JSON.stringify(d)}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});}
};

var DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
var DAYS_FULL=['Domingo','Segunda-feira','Terca-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sabado'];
var DEFAULT_CHK={
  abertura:['Conferir e-mails','Conferir Teams','Conferir WhatsApp','Conferir agenda do dia','Verificar ocorrencias','Conferir atividades NAC','Verificar pagamentos','Verificar matriculas','Conferir professores e instrutores','Conferir materiais'],
  encerramento:['Atividades concluidas registradas','Pendencias documentadas','Demandas para amanha anotadas','Registros do dia salvos','Setor organizado e fechado']
};

var tasks=[], mels=[], checkState={}, logs=[];
var checks=JSON.parse(localStorage.getItem('nac_chk_v3')||JSON.stringify(DEFAULT_CHK));
var tab='dashboard', wkOff=0, rtOff=0, syncOk=true;
var iaHist=[{r:'bot',t:'Ola! Sou o assistente do NAC. Estou conectado ao banco em tempo real. O que precisa?'}];
var iaBusy=false;
var briefing='', briefingLoading=false;

function saveChecks(){localStorage.setItem('nac_chk_v3',JSON.stringify(checks));}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function today(){return new Date().toISOString().slice(0,10);}
function fmtD(s){if(!s)return '-';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtDL(s){if(!s)return '';return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pdot(p){var m={Alta:'#D62828',Media:'#B86000',Baixa:'#1A7A4A'};return m[p]||'#9CA3AF';}
function bcls(s){var m={'Nao iniciado':'b-gray','Em andamento':'b-blue','Aguardando':'b-amber','Concluido':'b-green','Alta':'b-red','Media':'b-amber','Baixa':'b-green','Identificado':'b-gray','Em analise':'b-blue','Em execucao':'b-amber','Descartado':'b-gray'};return m[s]||'b-gray';}

function wkDates(off){
  if(!off)off=0;
  var n=new Date(),day=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-day+1+off*7);
  var r=[];
  for(var i=0;i<5;i++){var d=new Date(m);d.setDate(m.getDate()+i);r.push(d);}
  return r;
}

var toastT=null;
function toast(msg,type){
  var el=document.getElementById('the-toast');
  if(!el)return;
  el.textContent=msg;
  el.style.background=type==='ok'?'#1A7A4A':type==='err'?'#D62828':'#002B7F';
  el.style.color='#fff';
  el.style.display='block';
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(function(){el.style.display='none';},2500);
}

var mType=null,mData=null;

function modalOpen(type,data){
  mType=type;mData=data;
  var titleEl=document.getElementById('modal-title-el');
  var formEl=document.getElementById('modal-form');
  var footEl=document.getElementById('modal-foot');
  formEl.innerHTML='';footEl.innerHTML='';

  if(type==='task'){
    var t=data.task||{};
    titleEl.textContent=t.id?'Editar Tarefa':'Nova Tarefa';
    formEl.appendChild(fg('Titulo',inp('pm-t',t.titulo||'','O que precisa ser feito?')));
    formEl.appendChild(fg('Descricao',txt('pm-d',t.descricao||'')));
    var r1=row();r1.appendChild(fg('Data',inp('pm-data',t.data||data.date||'','','date')));r1.appendChild(fg('Horario',inp('pm-hr',t.hora||'','','time')));formEl.appendChild(r1);
    var r2=row();r2.appendChild(fg('Responsavel',sel('pm-resp',['Coordenador','Assistente','Ambos'],t.responsavel||'Coordenador')));r2.appendChild(fg('Destinatario',inp('pm-dest',t.destinatario||'','Para quem e?')));formEl.appendChild(r2);
    var r3=row();r3.appendChild(fg('Prioridade',sel('pm-prio',['Alta','Media','Baixa'],t.prioridade||'Media')));r3.appendChild(fg('Status',sel('pm-status',['Nao iniciado','Em andamento','Aguardando','Concluido'],t.status||'Nao iniciado')));formEl.appendChild(r3);
    formEl.appendChild(fg('Categoria',inp('pm-cat',t.categoria||'','Ex: Administrativo')));
    // Recorrencia
    var recDiv=document.createElement('div');recDiv.className='fg';
    var recLbl=document.createElement('label');recLbl.className='flbl';recLbl.textContent='Repetir nos dias';recDiv.appendChild(recLbl);
    var diasAtivos=t.dias_semana?t.dias_semana.split(','):[];
    var diasNomes=['Seg','Ter','Qua','Qui','Sex'];
    var diasVals=['1','2','3','4','5'];
    var diasRow=document.createElement('div');diasRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-top:4px';
    diasVals.forEach(function(v,i){
      var btn=document.createElement('button');
      btn.type='button';btn.textContent=diasNomes[i];btn.dataset.dia=v;
      btn.style.cssText='padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid '+(diasAtivos.indexOf(v)>=0?'#002B7F':'#D4D9ED')+';background:'+(diasAtivos.indexOf(v)>=0?'#002B7F':'#fff')+';color:'+(diasAtivos.indexOf(v)>=0?'#fff':'#4B5563');
      btn.onclick=function(){
        var active=this.style.background==='rgb(0, 43, 127)';
        this.style.background=active?'#fff':'#002B7F';
        this.style.color=active?'#4B5563':'#fff';
        this.style.borderColor=active?'#D4D9ED':'#002B7F';
      };
      diasRow.appendChild(btn);
    });
    recDiv.appendChild(diasRow);
    formEl.appendChild(recDiv);
    formEl.appendChild(fg('Observacoes',txt('pm-obs',t.observacoes||'')));
    if(t.status==='Concluido'||t.concluido_por){
      var r4=row3();
      r4.appendChild(fg('Concluido por',inp('pm-cby',t.concluido_por||'')));
      r4.appendChild(fg('Data conclusao',inp('pm-cdt',t.concluido_em?t.concluido_em.slice(0,10):'','','date')));
      r4.appendChild(fg('Hora conclusao',inp('pm-chr',t.concluido_em?t.concluido_em.slice(11,16):'','','time')));
      formEl.appendChild(r4);
    }
    var sb=mkBtn('Salvar','#002B7F','#fff');sb.onclick=submitTask;
    footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true));
    if(t.id){var db2=mkBtn('Excluir','#FDEAEA','#D62828');db2.onclick=function(){doDelTask(t.id);};footEl.appendChild(db2);}
    footEl.appendChild(sb);
  }
  else if(type==='mel'){
    var m=data.mel||{};
    titleEl.textContent=m.id?'Editar Melhoria':'Nova Melhoria';
    formEl.appendChild(fg('Problema identificado',txt('pm-prob',m.problema||'')));
    formEl.appendChild(fg('Sugestao de melhoria',txt('pm-sug',m.sugestao||'')));

    var r2=row();r2.appendChild(fg('Responsavel',sel('pm-resp',['Coordenador','Assistente','Equipe'],m.responsavel||'Coordenador')));r2.appendChild(fg('Setor encaminhado',inp('pm-setor',m.setor||'','Ex: Manutencao, TI...')));formEl.appendChild(r2);
    var r3=row();r3.appendChild(fg('Prazo',inp('pm-prazo',m.prazo||'','','date')));r3.appendChild(fg('Status',sel('pm-status',['Identificado','Em analise','Em execucao','Concluido','Descartado'],m.status||'Identificado')));formEl.appendChild(r3);
    var sb=mkBtn('Salvar','#002B7F','#fff');sb.onclick=submitMel;
    footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true));
    if(m.id){var db2=mkBtn('Excluir','#FDEAEA','#D62828');db2.onclick=function(){doDelMel(m.id);};footEl.appendChild(db2);}
    footEl.appendChild(sb);
  }
  else if(type==='log'){
    var day=data.day;
    titleEl.textContent='Registrar - '+fmtD(day);
    formEl.appendChild(fg('Tipo',sel('pm-log-tipo',['ocorrencia','decisao','reuniao','ideia','observacao'],'ocorrencia')));
    formEl.appendChild(fg('Descricao',txt('pm-log-txt','')));
    var sb=mkBtn('Registrar','#002B7F','#fff');
    sb.onclick=function(){submitLog(day);};
    footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true));footEl.appendChild(sb);
  }
  else if(type==='addchk'){
    var sec=data.sec;
    titleEl.textContent='Adicionar item - '+(sec==='abertura'?'Abertura':'Encerramento');
    formEl.appendChild(fg('Nome do item',inp('pm-chk-txt','','Ex: Verificar escala...')));
    var sb=mkBtn('Adicionar','#002B7F','#fff');
    sb.onclick=function(){submitChk(sec);};
    footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true));footEl.appendChild(sb);
  }

  document.getElementById('the-modal').classList.add('open');
  setTimeout(function(){var f=formEl.querySelector('input,textarea');if(f&&type!=='log')f.focus();},150);
}

function modalClose(){document.getElementById('the-modal').classList.remove('open');mType=null;mData=null;}

function fg(label,input){var d=document.createElement('div');d.className='fg';var l=document.createElement('label');l.className='flbl';l.textContent=label;d.appendChild(l);d.appendChild(input);return d;}
function row(){var d=document.createElement('div');d.className='frow';return d;}
function row3(){var d=document.createElement('div');d.className='frow3';return d;}
function inp(id,val,ph,type){var el=document.createElement('input');el.className='finp';el.id=id;el.type=type||'text';el.value=val||'';el.placeholder=ph||'';return el;}
function sel(id,opts,val){var el=document.createElement('select');el.className='fsel';el.id=id;opts.forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;if(o===val)op.selected=true;el.appendChild(op);});return el;}
function txt(id,val,ph){var el=document.createElement('textarea');el.className='ftxt';el.id=id;el.value=val||'';el.placeholder=ph||'';el.rows=3;return el;}
function mkBtn(label,bg,color,isCancel){var el=document.createElement('button');el.className='btn';el.textContent=label;el.style.background=bg;el.style.color=color;if(bg==='transparent')el.style.border='1.5px solid #D4D9ED';if(isCancel)el.onclick=modalClose;return el;}
function gv(id){return(document.getElementById(id)||{}).value||'';}

function submitTask(){
  var titulo=gv('pm-t');
  if(!titulo.trim()){toast('Informe o titulo','err');return;}
  var id=mData&&mData.task?mData.task.id:null;
  var statusVal=gv('pm-status')||'Nao iniciado';
  // Read selected days
  var diasSel=[];
  var diasBtns=document.querySelectorAll('[data-dia]');
  diasBtns.forEach(function(b){if(b.style.background==='rgb(0, 43, 127)')diasSel.push(b.dataset.dia);});
  var diasStr=diasSel.join(',');
  var item={id:id||uid(),titulo:titulo,descricao:gv('pm-d'),data:gv('pm-data'),hora:gv('pm-hr'),responsavel:gv('pm-resp')||'Coordenador',destinatario:gv('pm-dest'),prioridade:gv('pm-prio')||'Media',status:statusVal,categoria:gv('pm-cat'),observacoes:gv('pm-obs'),dias_semana:diasStr,recorrente:diasSel.length>0,criado_por:id&&mData.task.criado_por?mData.task.criado_por:'Coordenador',criado_em:id&&mData.task.criado_em?mData.task.criado_em:new Date().toISOString()};
  if(statusVal==='Concluido'){
    item.concluido_por=gv('pm-cby')||'Coordenador';
    var cdt=gv('pm-cdt'),chr=gv('pm-chr');
    item.concluido_em=cdt?(cdt+'T'+(chr||'00:00')):new Date().toISOString();
  }
  var p=id?db.patch('tarefas',id,item):db.post('tarefas',item);
  p.then(function(){return loadAll();}).then(function(){modalClose();toast('Tarefa salva!','ok');}).catch(function(){toast('Erro ao salvar','err');});
}

function doDelTask(id){
  if(!confirm('Excluir esta tarefa?'))return;
  db.del('tarefas',id).then(function(){return loadAll();}).then(function(){modalClose();toast('Excluida.');}).catch(function(){toast('Erro','err');});
}

function submitMel(){
  var problema=gv('pm-prob');
  if(!problema.trim()){toast('Descreva o problema','err');return;}
  var id=mData&&mData.mel?mData.mel.id:null;
  var item={id:id||uid(),problema:problema,sugestao:gv('pm-sug'),prioridade:gv('pm-prio')||'Media',impacto:gv('pm-imp')||'Medio',responsavel:gv('pm-resp')||'Coordenador',setor:gv('pm-setor'),prazo:gv('pm-prazo'),status:gv('pm-status')||'Identificado'};
  var p=id?db.patch('melhorias',id,item):db.post('melhorias',item);
  p.then(function(){return loadAll();}).then(function(){modalClose();toast('Melhoria salva!','ok');}).catch(function(){toast('Erro','err');});
}

function doDelMel(id){
  if(!confirm('Excluir?'))return;
  db.del('melhorias',id).then(function(){return loadAll();}).then(function(){modalClose();toast('Excluida.');}).catch(function(){toast('Erro','err');});
}

function submitLog(day){
  var tipo=gv('pm-log-tipo')||'ocorrencia';
  var texto=gv('pm-log-txt');
  if(!texto.trim()){toast('Descreva o registro','err');return;}
  var hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  var item={id:uid(),data:day,tipo:tipo,texto:texto,hora:hora};
  db.post('logs',item).then(function(){return loadAll();}).then(function(){modalClose();toast('Registrado!','ok');}).catch(function(){toast('Erro','err');});
}

function submitChk(sec){
  var t=gv('pm-chk-txt');
  if(!t.trim()){toast('Digite o nome do item','err');return;}
  checks[sec]=(checks[sec]||[]).concat([t.trim()]);
  saveChecks();modalClose();render();toast('Item adicionado!','ok');
}

function toggleCheck(day,sec,idx){
  if(!checkState[day])checkState[day]={};
  if(!checkState[day][sec])checkState[day][sec]={};
  var newVal=!checkState[day][sec][idx];
  checkState[day][sec][idx]=newVal;
  render();
  db.ups('checklist_state',{id:day+'_'+sec+'_'+idx,data:day,secao:sec,indice:idx,concluido:newVal}).catch(function(){});
}

function setStars(day,n){
  if(!checkState[day])checkState[day]={};
  checkState[day]._stars=n;
  render();
  db.ups('checklist_state',{id:day+'_stars_0',data:day,secao:'stars',indice:n,concluido:true}).catch(function(){});
  toast('Produtividade: '+n+'/5','ok');
}

function removeChkItem(sec,idx){
  if(!confirm('Remover este item?'))return;
  checks[sec].splice(idx,1);
  saveChecks();render();
}

function moveChkItem(sec,idx,dir){
  var arr=checks[sec];
  var ni=idx+dir;
  if(ni<0||ni>=arr.length)return;
  var tmp=arr[idx];arr[idx]=arr[ni];arr[ni]=tmp;
  saveChecks();render();
}

function loadAll(){
  return Promise.all([
    db.get('tarefas','order=criado_em.desc'),
    db.get('melhorias','order=criado_em.desc'),
    db.get('checklist_state'),
    db.get('logs','order=criado_em.desc&limit=200')
  ]).then(function(results){
    tasks=results[0]||[];
    mels=results[1]||[];
    var c=results[2]||[];
    var l=results[3]||[];
    checkState={};
    c.forEach(function(r){
      if(!checkState[r.data])checkState[r.data]={};
      if(r.secao==='stars')checkState[r.data]._stars=r.indice;
      else{if(!checkState[r.data][r.secao])checkState[r.data][r.secao]={};checkState[r.data][r.secao][r.indice]=r.concluido;}
    });
    logs=l;
    syncOk=true;
    if(!document.getElementById('the-modal').classList.contains('open'))render();
  }).catch(function(){syncOk=false;});
}

function buildCtx(){
  var td=today();
  var tj=tasks.filter(function(t){return t.data===td;});
  var at=tasks.filter(function(t){return t.data&&t.data<td&&t.status!=='Concluido';});
  var lh=logs.filter(function(l){return l.data===td;});
  var ab=checks.abertura||[];
  var cs=checkState[td]||{};
  var abD=ab.filter(function(_,i){return(cs.abertura||{})[i];}).length;
  var ma=mels.filter(function(m){return m.status!=='Concluido'&&m.status!=='Descartado';});
  var ctx='DATA:'+fmtDL(td);
  ctx+='\nTAREFAS HOJE('+tj.length+'):'+tj.map(function(t){return '['+t.status+']'+t.titulo+'|'+t.responsavel;}).join('/')||'Nenhuma';
  ctx+='\nATRASADAS('+at.length+'):'+at.map(function(t){return fmtD(t.data)+' '+t.titulo;}).join('/')||'Nenhuma';
  ctx+='\nCHECKLIST:'+abD+'/'+ab.length;
  ctx+='\nLOGS('+lh.length+'):'+lh.map(function(l){return '['+l.tipo+']'+l.texto.slice(0,40);}).join('/')||'Nenhum';
  ctx+='\nMELHORIAS('+ma.length+'):'+ma.slice(0,4).map(function(m){return '['+m.prioridade+']'+(m.problema||'').slice(0,40);}).join('/')||'Nenhuma';
  return ctx;
}

function callAI(systemMsg,userMsg){
  return fetch(EDGE,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
    body:JSON.stringify({system:systemMsg,messages:[{role:'user',content:userMsg}]})
  }).then(function(r){
    if(!r.ok)throw new Error(r.status);
    return r.json();
  }).then(function(d){
    return(d.content||[]).map(function(c){return c.text||'';}).join('');
  });
}

function genBriefing(){
  briefingLoading=true;briefing='';render();
  var sys='Voce e o assistente do NAC Marista. Direto, sem formalidade.\n\n'+buildCtx();
  callAI(sys,'Briefing direto do dia: prioridades, riscos, recomendacoes. Bullets. Max 200 palavras.')
  .then(function(r){briefing=r;briefingLoading=false;render();})
  .catch(function(){briefing='Erro ao conectar com a IA.';briefingLoading=false;render();});
}

function sendIA(msg){
  if(!msg||!msg.trim()||iaBusy)return;
  var userMsg=msg.trim();
  iaBusy=true;
  iaHist.push({r:'user',t:userMsg});
  var el=document.getElementById('ai-inp-el');
  if(el){el.value='';el.style.height='auto';}
  updateIAMsgs();
  var history=iaHist.slice(-8).map(function(m){return{role:m.r==='user'?'user':'assistant',content:m.t};});
  var sys='Voce e o assistente do NAC Marista. Direto, sem formalidade.\n\n'+buildCtx();
  fetch(EDGE,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
    body:JSON.stringify({system:sys,messages:history})
  }).then(function(r){
    if(!r.ok)throw new Error(r.status);
    return r.json();
  }).then(function(d){
    var reply=(d.content||[]).map(function(c){return c.text||'';}).join('');
    iaHist.push({r:'bot',t:reply});
    iaBusy=false;updateIAMsgs();
  }).catch(function(e){
    iaHist.push({r:'bot',t:'Erro ao conectar com a IA: '+e.message});
    iaBusy=false;updateIAMsgs();
  });
}

function updateIAMsgs(){
  var el=document.getElementById('ia-msgs-el');
  if(!el)return;
  var html=iaHist.map(function(m){return '<div class="ai-msg '+m.r+'">'+esc(m.t).replace(/\n/g,'<br>')+'</div>';}).join('');
  if(iaBusy)html+='<div class="ai-msg thinking">Analisando...</div>';
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
  var btn=document.querySelector('.ai-send');
  if(btn)btn.disabled=iaBusy;
}

function chkSectionH(day,sec,color,title){
  var items=checks[sec]||[];
  var dcs=checkState[day]||{};
  var st=(dcs[sec])||{};
  var done=items.filter(function(_,i){return st[i];}).length;
  var pct=items.length?Math.round(done/items.length*100):0;
  var rows=items.map(function(item,i){
    var checked=st[i];
    return '<div class="chk-item" onclick="toggleCheck(\''+day+'\',\''+sec+'\','+i+')">'
      +'<div class="chk-box'+(checked?' '+color:'')+'">'+(checked?'<span style="color:#fff;font-size:10px;font-weight:700">v</span>':'')+'</div>'
      +'<span class="chk-lbl'+(checked?' done':'')+'" style="font-size:12px">'+esc(item)+'</span>'
      +'<div onclick="event.stopPropagation()" style="display:flex;gap:2px">'
      +(i>0?'<button onclick="moveChkItem(\''+sec+'\','+i+',-1)" style="background:none;border:none;color:#D4D9ED;cursor:pointer;font-size:12px;padding:0">^</button>':'')
      +(i<items.length-1?'<button onclick="moveChkItem(\''+sec+'\','+i+',1)" style="background:none;border:none;color:#D4D9ED;cursor:pointer;font-size:12px;padding:0">v</button>':'')
      +'<button onclick="removeChkItem(\''+sec+'\','+i+')" style="background:none;border:none;color:#D4D9ED;cursor:pointer;font-size:14px;padding:0;line-height:1">x</button>'
      +'</div></div>';
  }).join('');
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    +'<span style="font-size:12px;font-weight:700;color:#111827">'+title+' ('+done+'/'+items.length+')</span>'
    +'<button onclick="modalOpen(\'addchk\',{sec:\''+sec+'\'})" style="background:none;border:1px solid #D4D9ED;border-radius:5px;width:22px;height:22px;font-size:13px;cursor:pointer;color:#4B5563;display:flex;align-items:center;justify-content:center">+</button>'

    +rows
    +'<div class="progress"><div class="prog-fill" style="width:'+pct+'%;background:'+(color==='green'?'#1A7A4A':'#002B7F')+'"></div></div>';
}

// ── DRAG & DROP ──────────────────────────
var dragId=null, dragDate=null;

function dragStart(e){
  dragId=e.currentTarget.dataset.id;
  dragDate=e.currentTarget.dataset.date;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='0.5';
}

function dragEnd(e){e.currentTarget.style.opacity='1';}

function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}

function drop(e,newDate){
  e.preventDefault();
  if(!dragId||dragDate===newDate)return;
  var task=tasks.find(function(t){return t.id===dragId;});
  if(!task)return;
  db.patch('tarefas',dragId,{data:newDate}).then(function(){
    tasks=tasks.map(function(t){return t.id===dragId?Object.assign({},t,{data:newDate}):t;});
    render();toast('Tarefa movida!','ok');
  }).catch(function(){toast('Erro ao mover','err');});
  dragId=null;dragDate=null;
}

// ── RECORRENCIA ──────────────────────────
function getRecurringTasks(weekDates){
  // For each recurring task, generate virtual instances for matching days
  var result=[];
  tasks.forEach(function(t){
    if(!t.recorrente||!t.dias_semana)return;
    var dias=t.dias_semana.split(',');
    weekDates.forEach(function(d){
      var dow=String(d.getDay()); // 0=dom,1=seg,...
      if(dias.indexOf(dow)>=0){
        var ds=d.toISOString().slice(0,10);
        // Only add if not already a regular task on that date
        var exists=tasks.some(function(x){return x.id===t.id&&x.data===ds;});
        if(!exists){
          result.push(Object.assign({},t,{data:ds,_virtual:true}));
        }
      }
    });
  });
  return result;
}

function allTasksForWeek(weekDates){
  var regular=tasks.filter(function(t){
    var ds=t.data;
    return weekDates.some(function(d){return d.toISOString().slice(0,10)===ds;});
  });
  var recurring=getRecurringTasks(weekDates);
  return regular.concat(recurring);
}

    +'<div class="content">'+panel+'</div>'
    +'<div class="bottom-nav">'+navBtns+'</div>'
    +'</div>'
    +'<div class="sb-ov" id="sb-ov">'
    +'<div class="sb-bg" onclick="document.getElementById(\'sb-ov\').classList.remove(\'open\')"></div>'
    +'<div class="sb-mobile">'+sbContent+'</div>'
    +'</div>';

  if(tab==='ia'){var el=document.getElementById('ia-msgs-el');if(el)el.scrollTop=el.scrollHeight;}
}

document.getElementById('modal-close-btn').onclick=modalClose;
document.getElementById('the-modal').onclick=function(e){if(e.target===this)modalClose();};

render();
loadAll();
setInterval(function(){if(!document.getElementById('the-modal').classList.contains('open'))loadAll();},30000);
</script>
</body>
