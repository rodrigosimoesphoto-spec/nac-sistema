<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light">
<title>Gestão NAC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#F0F2F8;font-family:'Inter',sans-serif;color:#111827;font-size:14px;-webkit-text-size-adjust:100%}
button{font-family:'Inter',sans-serif;-webkit-appearance:none;appearance:none}
input,select,textarea{font-family:'Inter',sans-serif;-webkit-appearance:none;appearance:none;font-size:16px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#D4D9ED;border-radius:4px}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #D4D9ED;padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:50}
.content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.bottom-nav{background:#fff;border-top:1px solid #D4D9ED;display:flex;flex-shrink:0;z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;background:none;border:none;cursor:pointer;gap:2px}
.nav-icon{font-size:20px}
.nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#9CA3AF}
.nav-btn.active .nav-label{color:#002B7F}
.nav-active-bar{width:20px;height:2px;background:#002B7F;border-radius:2px}

/* SIDEBAR */
.sidebar-ov{position:fixed;inset:0;z-index:100;display:flex}
.sidebar-bg{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.sidebar{position:relative;width:220px;background:#002B7F;height:100%;display:flex;flex-direction:column;z-index:1;overflow-y:auto}
.sb-brand{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;color:#fff}
.sb-sub{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}
.sb-nav{flex:1;padding:10px 8px}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;margin-bottom:2px}
.sb-btn.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.sb-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

/* CARDS */
.card{background:#fff;border:1px solid #D4D9ED;border-radius:12px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid #E8EBF5;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:13px;font-weight:700;color:#111827}
.card-body{padding:16px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:#fff;border:1px solid #D4D9ED;border-radius:12px;padding:14px 16px}
.kpi.accent{background:#002B7F;border-color:#002B7F}
.kpi.red{border-left:3px solid #D62828}
.kpi.green{border-left:3px solid #1A7A4A}
.kpi.amber{border-left:3px solid #B86000}
.kpi-n{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:800;line-height:1;color:#002B7F}
.kpi.accent .kpi-n{color:#fff}
.kpi.red .kpi-n{color:#D62828}
.kpi.green .kpi-n{color:#1A7A4A}
.kpi.amber .kpi-n{color:#B86000}
.kpi-l{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px;margin-top:3px}
.kpi.accent .kpi-l{color:rgba(255,255,255,.55)}
.kpi-t{font-size:11px;font-weight:600;color:#9CA3AF;margin-top:2px}
.kpi.accent .kpi-t{color:rgba(255,255,255,.6)}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.b-gray{background:#F7F8FC;color:#9CA3AF}
.b-blue{background:#E8EDF8;color:#002B7F}
.b-red{background:#FDEAEA;color:#D62828}
.b-green{background:#E3F5EC;color:#1A7A4A}
.b-amber{background:#FEF3E2;color:#B86000}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;background:#002B7F;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn.ghost{background:transparent;border:1.5px solid #D4D9ED;color:#4B5563}
.btn.sm{padding:6px 12px;font-size:11px}
.btn.red{background:#FDEAEA;color:#D62828}
.btn.green{background:#1A7A4A}

/* FORMS */
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;color:#4B5563;text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1.5px solid #D4D9ED;border-radius:8px;font-size:16px;color:#111827;background:#fff;outline:none;line-height:1.4}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#002B7F}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-head{background:#002B7F;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1;border-radius:16px 16px 0 0}
.modal-title{color:#fff;font-size:14px;font-weight:700}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:12px;flex:1}
.modal-footer{padding:12px 16px;border-top:1px solid #D4D9ED;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}

/* TASK ITEM */
.task-item{background:#fff;border:1px solid #D4D9ED;border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.task-item.done{opacity:.55}
.task-title{font-size:13px;font-weight:600;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-meta{font-size:10px;color:#9CA3AF;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.prio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* CHECK ITEM */
.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #E8EBF5;cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-box{width:18px;height:18px;border-radius:4px;border:2px solid #D4D9ED;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.check-box.checked-blue{background:#002B7F;border-color:#002B7F}
.check-box.checked-green{background:#1A7A4A;border-color:#1A7A4A}
.check-label{font-size:13px;color:#111827;flex:1;line-height:1.3}
.check-label.done{text-decoration:line-through;color:#9CA3AF}

/* PROGRESS */
.progress{height:5px;background:#E8EBF5;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}

/* LOG ITEM */
.log-item{padding:9px 11px;background:#F7F8FC;border-radius:8px;border-left:3px solid #D4D9ED;margin-bottom:8px}

/* WEEK VIEW */
.week-scroll{overflow-x:auto;padding-bottom:8px}
.week-cols{display:flex;gap:10px;min-width:max-content}
.week-col{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.week-col-head{border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.week-col-head.today{background:#002B7F}
.week-col-head.normal{background:#fff;border:1.5px solid #D4D9ED}
.week-col-section{background:#fff;border:1px solid #D4D9ED;border-radius:10px;overflow:hidden}
.week-col-section-head{padding:8px 12px;border-bottom:1px solid #E8EBF5;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:#111827}
.week-col-section-body{padding:8px 12px}
.week-mini-task{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid #E8EBF5;cursor:pointer}
.week-mini-task:last-child{border-bottom:none}
.week-mini-log{padding:6px 8px;background:#F7F8FC;border-radius:6px;margin-bottom:5px}

/* STARS */
.stars{display:flex;gap:4px}
.star-btn{font-size:22px;background:none;border:none;cursor:pointer;padding:0;line-height:1}

/* AI */
.ai-msgs{padding:14px;display:flex;flex-direction:column;gap:10px;min-height:260px;max-height:360px;overflow-y:auto}
.ai-msg{max-width:88%;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.55}
.ai-msg.bot{background:#E8EDF8;color:#111827;align-self:flex-start}
.ai-msg.user{background:#002B7F;color:#fff;align-self:flex-end}
.ai-msg.loading{background:#F7F8FC;color:#9CA3AF;font-style:italic;align-self:flex-start}
.ai-input-row{border-top:1px solid #D4D9ED;padding:10px 12px;display:flex;gap:8px;align-items:flex-end}
.ai-input{flex:1;border:1.5px solid #D4D9ED;border-radius:8px;padding:9px 11px;font-size:16px;color:#111827;background:#fff;outline:none;resize:none;min-height:38px;max-height:100px;font-family:'Inter',sans-serif;line-height:1.4}
.ai-input:focus{border-color:#002B7F}
.ai-send{background:#002B7F;color:#fff;border:none;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0}
.ai-send:disabled{opacity:.4}
.quick-btn{text-align:left;padding:10px 14px;background:#F7F8FC;border:1px solid #D4D9ED;border-radius:8px;font-size:13px;color:#111827;cursor:pointer;font-family:'Inter',sans-serif;width:100%;display:block;margin-bottom:8px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,43,127,.25);pointer-events:none}

/* EMPTY */
.empty{text-align:center;padding:24px 16px;color:#9CA3AF;font-size:12px}
</style>
</head>
<body>
<div class="app" id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#002B7F;font-size:14px">Carregando...</div>
</div>

<script>
// ═══════════════════════════════
// CONFIG & SUPABASE
// ═══════════════════════════════
const SB_URL="https://syuqwuqkbkqpysugltky.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dXF3dXFrYmtxcHlzdWdsdGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNTc5MDUsImV4cCI6MjA5OTYzMzkwNX0.gh_wA901Mos_8Sot_hSf9Uu1zm_1IQSzcnJVPFLskrM";
const EDGE_FN="https://syuqwuqkbkqpysugltky.supabase.co/functions/v1/nac-ia";
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

const sb={
  async get(t,p=''){const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();},
  async post(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async patch(t,id,d){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async del(t,id){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());},
  async upsert(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
};

// ═══════════════════════════════
// STATE
// ═══════════════════════════════
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DAYS_FULL=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const CHK_DEF={
  abertura:['Conferir e-mails','Conferir Teams','Conferir WhatsApp','Conferir agenda','Verificar ocorrências','Conferir atividades NAC','Verificar pagamentos','Verificar matrículas','Conferir professores','Conferir materiais'],
  encerramento:['Atividades concluídas registradas','Pendências documentadas','Demandas para amanhã','Registros do dia salvos','Setor organizado']
};

let state={
  tab:'dashboard',
  sidebar:false,
  tasks:[],
  melhorias:[],
  checkState:{},
  logs:{},
  checks:JSON.parse(localStorage.getItem('nac_checks')||JSON.stringify(CHK_DEF)),
  syncing:false,
  syncOk:true,
  toast:{msg:'',type:''},
  toastTimer:null,
  modal:null, // {type,data}
  weekOffset:0,
  rotinaWeekOffset:0,
  briefing:'',
  briefingLoading:false,
  iaHistory:[{role:'bot',text:'Olá! Sou o assistente do NAC. Estou conectado ao banco em tempo real. O que precisa?'}],
  iaSending:false,
  iaInput:'',
};

function setState(patch,skipRender=false){
  const prev=state.modal;
  Object.assign(state,typeof patch==='function'?patch(state):patch);
  if(skipRender)return;
  // If modal is open and we're only updating non-modal fields, don't rebuild the whole page
  if(state.modal && prev===state.modal){
    // Only update modal container
    const modalEl=document.getElementById('modal-container');
    if(modalEl)modalEl.innerHTML=modalHTML();
    // Update toast
    const toastEl=document.getElementById('toast-container');
    if(toastEl)toastEl.innerHTML=state.toast.msg?`<div class="toast" style="background:${state.toast.type==='success'?'#1A7A4A':state.toast.type==='error'?'#D62828':'#002B7F'};color:#fff">${esc(state.toast.msg)}</div>`:'';
    return;
  }
  render();
}

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;};
const fmtDateLong=s=>{if(!s)return'';return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function getWeekDates(offset=0){
  const now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-day+1+offset*7);
  return[0,1,2,3,4].map(i=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function showToast(msg,type=''){
  if(state.toastTimer)clearTimeout(state.toastTimer);
  const timer=setTimeout(()=>setState({toast:{msg:'',type:''}}),2500);
  setState({toast:{msg,type},toastTimer:timer});
}

function badgeCls(s){
  const m={'Não iniciado':'b-gray','Em andamento':'b-blue','Aguardando':'b-amber','Concluído':'b-green','Alta':'b-red','Média':'b-amber','Baixa':'b-green','Identificado':'b-gray','Em análise':'b-blue','Em execução':'b-amber','Descartado':'b-gray'};
  return m[s]||'b-gray';
}

function prioDotColor(p){return{'Alta':'#D62828','Média':'#B86000','Baixa':'#1A7A4A'}[p]||'#9CA3AF';}

// ═══════════════════════════════
// DATA OPS
// ═══════════════════════════════
async function loadAll(){
  setState({syncing:true});
  try{
    const[t,m,cs,l]=await Promise.all([
      sb.get('tarefas','order=criado_em.desc'),
      sb.get('melhorias','order=criado_em.desc'),
      sb.get('checklist_state'),
      sb.get('logs','order=criado_em.desc')
    ]);
    const cs2={};
    (cs||[]).forEach(r=>{
      if(!cs2[r.data])cs2[r.data]={};
      if(!cs2[r.data][r.secao])cs2[r.data][r.secao]={};
      if(r.secao==='stars')cs2[r.data]._stars=r.indice;
      else cs2[r.data][r.secao][r.indice]=r.concluido;
    });
    const l2={};
    (l||[]).forEach(r=>{if(!l2[r.data])l2[r.data]=[];l2[r.data].push(r);});
    setState({tasks:t||[],melhorias:m||[],checkState:cs2,logs:l2,syncing:false,syncOk:true});
  }catch(e){setState({syncing:false,syncOk:false});}
}

async function saveTask(item){
  try{
    if(state.tasks.find(t=>t.id===item.id)){
      await sb.patch('tarefas',item.id,item);
      setState({tasks:state.tasks.map(t=>t.id===item.id?{...t,...item}:t),modal:null});
    }else{
      await sb.post('tarefas',item);
      setState({tasks:[item,...state.tasks],modal:null});
    }
    showToast('Tarefa salva!','success');
  }catch(e){showToast('Erro ao salvar','error');}
}

async function deleteTask(id){
  try{
    await sb.del('tarefas',id);
    setState({tasks:state.tasks.filter(t=>t.id!==id),modal:null});
    showToast('Excluída.');
  }catch(e){showToast('Erro ao excluir','error');}
}

async function saveMelhoria(item){
  try{
    if(state.melhorias.find(m=>m.id===item.id)){
      await sb.patch('melhorias',item.id,item);
      setState({melhorias:state.melhorias.map(m=>m.id===item.id?{...m,...item}:m),modal:null});
    }else{
      await sb.post('melhorias',item);
      setState({melhorias:[item,...state.melhorias],modal:null});
    }
    showToast('Melhoria salva!','success');
  }catch(e){showToast('Erro ao salvar','error');}
}

async function deleteMelhoria(id){
  try{
    await sb.del('melhorias',id);
    setState({melhorias:state.melhorias.filter(m=>m.id!==id),modal:null});
    showToast('Excluída.');
  }catch(e){showToast('Erro ao excluir','error');}
}

async function toggleCheck(day,section,idx){
  const cur=((state.checkState[day]||{})[section]||{})[idx];
  const newVal=!cur;
  const cs={...state.checkState};
  if(!cs[day])cs[day]={};
  if(!cs[day][section])cs[day][section]={};
  cs[day][section]={...cs[day][section],[idx]:newVal};
  state.checkState=cs; // Update state directly without triggering modal re-render
  render();
  try{await sb.upsert('checklist_state',{id:`${day}_${section}_${idx}`,data:day,secao:section,indice:idx,concluido:newVal});}catch(e){}
}

async function setStars(day,n){
  const cs={...state.checkState};
  if(!cs[day])cs[day]={};
  cs[day]={...cs[day],_stars:n};
  setState({checkState:cs});
  try{await sb.upsert('checklist_state',{id:`${day}_stars_0`,data:day,secao:'stars',indice:n,concluido:true});}catch(e){}
  showToast(`Produtividade: ${n}/5 ⭐`,'success');
}

async function saveLog(day,tipo,texto){
  const hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const item={id:uid(),data:day,tipo,texto,hora};
  try{
    await sb.post('logs',item);
    const l={...state.logs};
    l[day]=[...(l[day]||[]),item];
    setState({logs:l,modal:null});
    showToast('Registrado!','success');
  }catch(e){showToast('Erro ao registrar','error');}
}

// ═══════════════════════════════
// AI
// ═══════════════════════════════
function buildContext(){
  const today=todayStr();
  const tj=state.tasks.filter(t=>t.data===today);
  const at=state.tasks.filter(t=>t.data&&t.data<today&&t.status!=='Concluído');
  const lh=state.logs[today]||[];
  const cs=state.checkState[today]||{};
  const ad=(state.checks.abertura||[]).filter((_,i)=>(cs.abertura||{})[i]).length;
  const ma=state.melhorias.filter(m=>m.status!=='Concluído'&&m.status!=='Descartado');
  return`DATA: ${fmtDateLong(today)}\nTAREFAS HOJE(${tj.length}): ${tj.map(t=>`[${t.status}] ${t.titulo}|${t.responsavel}|${t.prioridade}`).join(' / ')||'Nenhuma'}\nATRASADAS(${at.length}): ${at.map(t=>`${fmtDate(t.data)} ${t.titulo}`).join(' / ')||'Nenhuma'}\nCHECKLIST ABERTURA: ${ad}/${(state.checks.abertura||[]).length}\nLOGS HOJE(${lh.length}): ${lh.map(l=>`[${l.tipo}] ${l.texto.slice(0,50)}`).join(' / ')||'Nenhum'}\nMELHORIAS ATIVAS(${ma.length}): ${ma.slice(0,4).map(m=>`[${m.prioridade}] ${(m.problema||'').slice(0,50)}`).join(' / ')||'Nenhuma'}`;
}

async function sendIA(msg){
  if(!msg.trim()||state.iaSending)return;
  const hist=[...state.iaHistory,{role:'user',text:msg}];
  setState({iaHistory:hist,iaSending:true,iaInput:''});
  try{
    const messages=hist.slice(-8).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
    const system=`Você é o assistente de gestão do NAC de um colégio Marista. Português direto, sem formalidade. Objetivo e prático.\n\n${buildContext()}`;
    const r=await fetch(EDGE_FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},body:JSON.stringify({system,messages})});
    const d=await r.json();
    const reply=d.content?.map(c=>c.text||'').join('')||'Erro na resposta.';
    setState({iaHistory:[...state.iaHistory,{role:'bot',text:reply}],iaSending:false});
  }catch(e){
    setState({iaHistory:[...state.iaHistory,{role:'bot',text:'Erro ao conectar com a IA.'}],iaSending:false});
  }
}

async function genBriefing(){
  setState({briefingLoading:true,briefing:''});
  try{
    const r=await fetch(EDGE_FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},body:JSON.stringify({system:`Assistente do NAC. Dados: ${buildContext()}`,messages:[{role:'user',content:'Briefing direto do dia: prioridades, riscos, recomendações. Bullets. Máx 200 palavras.'}]})});
    const d=await r.json();
    setState({briefing:d.content?.map(c=>c.text||'').join('')||'Erro.',briefingLoading:false});
  }catch(e){setState({briefing:'Erro ao conectar com a IA.',briefingLoading:false});}
}

function checklistHTML(day,section,color='blue'){
  const items=state.checks[section]||[];

  return items.map((item,i)=>`

      <div class="ai-msgs" id="ia-msgs">${msgs}${loading}</div>
      <div class="ai-input-row">
        <textarea class="ai-input" id="ia-input" placeholder="Pergunte sobre o NAC..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendIA(document.getElementById('ia-input').value)}">${esc(state.iaInput)}</textarea>
        <button class="ai-send" onclick="sendIA(document.getElementById('ia-input').value)" ${state.iaSending?'disabled':''}>➤</button>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">⚡ Ações rápidas</span></div>
      <div class="card-body">${quick}</div>
    </div>`;
}

function melhoriaItemHTML(m){
  const pc=prioDotColor(m.prioridade);
  return`<div class="card" style="cursor:pointer" onclick="openMel('${m.id}')">
    <div style="padding:12px 14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
        <div class="prio-dot" style="background:${pc}"></div>
        <span style="font-size:13px;font-weight:700;color:#111827;flex:1">${esc((m.problema||'').slice(0,70))}${(m.problema||'').length>70?'…':''}</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span class="badge ${badgeCls(m.prioridade)}">${esc(m.prioridade)}</span>
        <span class="badge ${badgeCls(m.status)}">${esc(m.status)}</span>
        <span style="font-size:10px;color:#9CA3AF">👤 ${esc(m.responsavel||'')}</span>
        ${m.prazo?`<span style="font-size:10px;color:#9CA3AF">📅 ${fmtDate(m.prazo)}</span>`:''}
      </div>
      ${m.sugestao?`<div style="font-size:12px;color:#4B5563;line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid #E8EBF5">💬 ${esc(m.sugestao)}</div>`:''}
    </div>
  </div>`;
}

function melhoriaHTML(){
  const fS=document.getElementById('f-mel-s')?.value||'';
  const fP=document.getElementById('f-mel-p')?.value||'';
  const prioOrder={'Alta':0,'Média':1,'Baixa':2};
  let list=state.melhorias.filter(m=>{if(fS&&m.status!==fS)return false;if(fP&&m.prioridade!==fP)return false;return true;});
  list=[...list].sort((a,b)=>(prioOrder[a.prioridade]||1)-(prioOrder[b.prioridade]||1));
  const total=state.melhorias.length,emAnd=state.melhorias.filter(m=>m.status==='Em execução').length,conc=state.melhorias.filter(m=>m.status==='Concluído').length,alta=state.melhorias.filter(m=>m.prioridade==='Alta'&&m.status!=='Concluído').length;
  return`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;color:#111827">Melhorias</div>
      <button class="btn sm" onclick="openNewMel()">+ Nova</button>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-n">${total}</div><div class="kpi-l">Total</div></div>
      <div class="kpi amber"><div class="kpi-n">${emAnd}</div><div class="kpi-l">Em execução</div></div>
      <div class="kpi green"><div class="kpi-n">${conc}</div><div class="kpi-l">Concluídas</div></div>
      <div class="kpi red"><div class="kpi-n">${alta}</div><div class="kpi-l">Alta prioridade</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <select id="f-mel-s" onchange="render()" style="flex:1;font-size:12px;padding:8px 10px;border:1px solid #D4D9ED;border-radius:8px;background:#fff;color:#111827">
        <option value="">Todos status</option><option>Identificado</option><option>Em análise</option><option>Em execução</option><option>Concluído</option><option>Descartado</option>
      </select>
      <select id="f-mel-p" onchange="render()" style="flex:1;font-size:12px;padding:8px 10px;border:1px solid #D4D9ED;border-radius:8px;background:#fff;color:#111827">
        <option value="">Todas prioridades</option><option>Alta</option><option>Média</option><option>Baixa</option>
      </select>
    </div>
    ${list.length?list.map(m=>melhoriaItemHTML(m)).join(''):`<div class="card"><div class="empty">Nenhuma melhoria. Clique em + Nova.</div></div>`}`;
}

// ═══════════════════════════════
// MODALS
// ═══════════════════════════════
function modalHTML(){
  if(!state.modal)return'';
  const {type,data}=state.modal;

  if(type==='task'){
    const t=data.task||{};
    return`<div class="modal-ov" onclick="if(event.target===this)setState({modal:null})">
      <div class="modal">
        <div class="modal-head">
          <span class="modal-title">${t.id?'Editar Tarefa':'Nova Tarefa'}</span>
          <button class="modal-close" onclick="setState({modal:null})">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group"><label class="form-label">Título</label><input class="form-input" id="t-titulo" value="${esc(t.titulo||'')}" placeholder="O que precisa ser feito?"></div>
          <div class="form-group"><label class="form-label">Descrição</label><textarea class="form-textarea" id="t-desc" rows="2">${esc(t.descricao||'')}</textarea></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Data</label><input class="form-input" type="date" id="t-data" value="${t.data||data.date||todayStr()}"></div>
            <div class="form-group"><label class="form-label">Horário</label><input class="form-input" type="time" id="t-hora" value="${t.hora||''}"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Responsável</label><select class="form-select" id="t-resp"><option${(t.responsavel||'Coordenador')==='Coordenador'?' selected':''}>Coordenador</option><option${t.responsavel==='Assistente'?' selected':''}>Assistente</option><option${t.responsavel==='Ambos'?' selected':''}>Ambos</option></select></div>
            <div class="form-group"><label class="form-label">Prioridade</label><select class="form-select" id="t-prio"><option${t.prioridade==='Alta'?' selected':''}>Alta</option><option${(!t.prioridade||t.prioridade==='Média')?' selected':''}>Média</option><option${t.prioridade==='Baixa'?' selected':''}>Baixa</option></select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="t-status"><option${(!t.status||t.status==='Não iniciado')?' selected':''}>Não iniciado</option><option${t.status==='Em andamento'?' selected':''}>Em andamento</option><option${t.status==='Aguardando'?' selected':''}>Aguardando</option><option${t.status==='Concluído'?' selected':''}>Concluído</option></select></div>
            <div class="form-group"><label class="form-label">Categoria</label><input class="form-input" id="t-cat" value="${esc(t.categoria||'')}" placeholder="Ex: Administrativo"></div>
          </div>
          <div class="form-group"><label class="form-label">Observações</label><textarea class="form-textarea" id="t-obs" rows="2">${esc(t.observacoes||'')}</textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn ghost" onclick="setState({modal:null})">Cancelar</button>
          ${t.id?`<button class="btn red" onclick="deleteTask('${t.id}')">Excluir</button>`:''}
          <button class="btn" onclick="submitTask()">Salvar</button>
        </div>
      </div>
    </div>`;
  }

  if(type==='mel'){
    const m=data.mel||{};
    return`<div class="modal-ov" onclick="if(event.target===this)setState({modal:null})">
      <div class="modal">
        <div class="modal-head">
          <span class="modal-title">${m.id?'Editar Melhoria':'Nova Melhoria'}</span>
          <button class="modal-close" onclick="setState({modal:null})">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group"><label class="form-label">Problema identificado</label><textarea class="form-textarea" id="m-prob" rows="3">${esc(m.problema||'')}</textarea></div>
          <div class="form-group"><label class="form-label">Sugestão</label><textarea class="form-textarea" id="m-sug" rows="3">${esc(m.sugestao||'')}</textarea></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Prioridade</label><select class="form-select" id="m-prio"><option${m.prioridade==='Alta'?' selected':''}>Alta</option><option${(!m.prioridade||m.prioridade==='Média')?' selected':''}>Média</option><option${m.prioridade==='Baixa'?' selected':''}>Baixa</option></select></div>
            <div class="form-group"><label class="form-label">Impacto</label><select class="form-select" id="m-imp"><option${m.impacto==='Alto'?' selected':''}>Alto</option><option${(!m.impacto||m.impacto==='Médio')?' selected':''}>Médio</option><option${m.impacto==='Baixo'?' selected':''}>Baixo</option></select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Responsável</label><select class="form-select" id="m-resp"><option${(!m.responsavel||m.responsavel==='Coordenador')?' selected':''}>Coordenador</option><option${m.responsavel==='Assistente'?' selected':''}>Assistente</option><option${m.responsavel==='Equipe'?' selected':''}>Equipe</option></select></div>
            <div class="form-group"><label class="form-label">Prazo</label><input class="form-input" type="date" id="m-prazo" value="${m.prazo||''}"></div>
          </div>
          <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="m-status"><option${(!m.status||m.status==='Identificado')?' selected':''}>Identificado</option><option${m.status==='Em análise'?' selected':''}>Em análise</option><option${m.status==='Em execução'?' selected':''}>Em execução</option><option${m.status==='Concluído'?' selected':''}>Concluído</option><option${m.status==='Descartado'?' selected':''}>Descartado</option></select></div>
        </div>
        <div class="modal-footer">
          <button class="btn ghost" onclick="setState({modal:null})">Cancelar</button>
          ${m.id?`<button class="btn red" onclick="deleteMelhoria('${m.id}')">Excluir</button>`:''}
          <button class="btn" onclick="submitMel()">Salvar</button>
        </div>
      </div>
    </div>`;
  }

  if(type==='log'){
    const day=data.day;
    return`<div class="modal-ov" onclick="if(event.target===this)setState({modal:null})">
      <div class="modal">
        <div class="modal-head">
          <span class="modal-title">Registrar — ${fmtDate(day)}</span>
          <button class="modal-close" onclick="setState({modal:null})">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group"><label class="form-label">Tipo</label>
            <select class="form-select" id="log-tipo">
              <option value="ocorrencia">🔴 Ocorrência</option>
              <option value="decisao">🔵 Decisão</option>
              <option value="reuniao">🟢 Reunião</option>
              <option value="ideia">🟣 Ideia</option>
              <option value="observacao">🟡 Observação</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Descrição</label><textarea class="form-textarea" id="log-texto" rows="4" placeholder="Descreva o que aconteceu..."></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn ghost" onclick="setState({modal:null})">Cancelar</button>
          <button class="btn" onclick="submitLog('${day}')">Registrar</button>
        </div>
      </div>
    </div>`;
  }
  return'';
}

// ═══════════════════════════════
// FORM SUBMIT
// ═══════════════════════════════
function submitTask(){
  const id=state.modal?.data?.task?.id;
  const item={
    id:id||uid(),
    titulo:document.getElementById('t-titulo')?.value||'',
    descricao:document.getElementById('t-desc')?.value||'',
    data:document.getElementById('t-data')?.value||todayStr(),
    hora:document.getElementById('t-hora')?.value||'',
    responsavel:document.getElementById('t-resp')?.value||'Coordenador',
    prioridade:document.getElementById('t-prio')?.value||'Média',
    status:document.getElementById('t-status')?.value||'Não iniciado',
    categoria:document.getElementById('t-cat')?.value||'',
    observacoes:document.getElementById('t-obs')?.value||''
  };
  if(!item.titulo.trim()){showToast('Informe o título','error');return;}
  saveTask(item);
}

function submitMel(){
  const id=state.modal?.data?.mel?.id;
  const item={
    id:id||uid(),
    problema:document.getElementById('m-prob')?.value||'',
    sugestao:document.getElementById('m-sug')?.value||'',
    prioridade:document.getElementById('m-prio')?.value||'Média',
    impacto:document.getElementById('m-imp')?.value||'Médio',
    responsavel:document.getElementById('m-resp')?.value||'Coordenador',
    prazo:document.getElementById('m-prazo')?.value||'',
    status:document.getElementById('m-status')?.value||'Identificado'
  };
  if(!item.problema.trim()){showToast('Descreva o problema','error');return;}
  saveMelhoria(item);
}

function submitLog(day){
  const tipo=document.getElementById('log-tipo')?.value||'ocorrencia';
  const texto=document.getElementById('log-texto')?.value||'';
  if(!texto.trim()){showToast('Descreva o registro','error');return;}
  saveLog(day,tipo,texto);
}

// ═══════════════════════════════
// OPEN HELPERS
// ═══════════════════════════════
function openTask(id){setState({modal:{type:'task',data:{task:state.tasks.find(t=>t.id===id)}}});}
function openNewTask(date=''){setState({modal:{type:'task',data:{task:null,date:date||todayStr()}}});}
function openMel(id){setState({modal:{type:'mel',data:{mel:state.melhorias.find(m=>m.id===id)}}});}
function openNewMel(){setState({modal:{type:'mel',data:{mel:null}}});}
function openLogModal(day){setState({modal:{type:'log',data:{day}}});}

// ═══════════════════════════════
// MAIN RENDER
// ═══════════════════════════════
const NAV=[
  {id:'dashboard',icon:'📊',label:'Dashboard'},
  {id:'rotina',icon:'☀️',label:'Rotina'},
  {id:'semana',icon:'📅',label:'Semana'},
  {id:'ia',icon:'🤖',label:'IA'},
  {id:'melhorias',icon:'💡',label:'Melhorias'},
];

function render(){
  const now=new Date();
  const dateStr=now.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})+' · '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  let panelHTML='';
  if(state.tab==='dashboard')panelHTML=dashboardHTML();
  else if(state.tab==='rotina')panelHTML=rotinaHTML();
  else if(state.tab==='semana')panelHTML=semanaHTML();
  else if(state.tab==='ia')panelHTML=iaHTML();
  else if(state.tab==='melhorias')panelHTML=melhoriaHTML();

  const sidebarHTML=state.sidebar?`<div class="sidebar-ov">
    <div class="sidebar-bg" onclick="setState({sidebar:false})"></div>
    <div class="sidebar">
      <div class="sb-brand"><div class="sb-logo">NAC</div><div class="sb-sub">Centro de Comando</div></div>
      <nav class="sb-nav">
        ${NAV.map(n=>`<button class="sb-btn${state.tab===n.id?' active':''}" onclick="setState({tab:'${n.id}',sidebar:false})"><span style="font-size:16px">${n.icon}</span>${n.label}</button>`).join('')}
      </nav>
      <div class="sb-footer">
        <div class="sb-user">
          <div class="sb-avatar">N</div>
          <div><div style="font-size:12px;color:rgba(255,255,255,.7);font-weight:500">NAC · Marista</div><div style="font-size:9px;color:rgba(255,255,255,.4)">${state.syncing?'Sincronizando...':state.syncOk?'Sincronizado':'Erro de conexão'}</div></div>
        </div>
      </div>
    </div>
  </div>`:'';

  const toastHTML=''; // Toast handled by separate container

  document.getElementById('app').innerHTML=`
    <div class="app">
      <div class="topbar">
        <button onclick="setState({sidebar:true})" style="background:none;border:none;font-size:20px;cursor:pointer;color:#4B5563;padding:4px;display:flex;align-items:center">☰</button>
        <span style="font-family:'Montserrat',sans-serif;font-size:15px;font-weight:800;color:#002B7F">NAC</span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:${state.syncOk?'#1A7A4A':'#D62828'};flex-shrink:0"></div>
          <span style="font-size:11px;color:#9CA3AF">${dateStr}</span>
        </div>
      </div>
      <div class="content">${panelHTML}</div>
      <div class="bottom-nav">
        ${NAV.map(n=>`<button class="nav-btn${state.tab===n.id?' active':''}" onclick="setState({tab:'${n.id}'})">
          <span class="nav-icon">${n.icon}</span>
          <span class="nav-label">${n.label}</span>
          ${state.tab===n.id?'<div class="nav-active-bar"></div>':''}
        </button>`).join('')}
      </div>
    </div>
    ${sidebarHTML}
    ${toastHTML}`;

  // Modal in separate container to prevent re-render on input
  let modalContainer=document.getElementById('modal-container');
  if(!modalContainer){
    modalContainer=document.createElement('div');
    modalContainer.id='modal-container';
    document.body.appendChild(modalContainer);
  }
  modalContainer.innerHTML=modalHTML();

  // Scroll IA to bottom
  if(state.tab==='ia'){
    const el=document.getElementById('ia-msgs');
    if(el)el.scrollTop=el.scrollHeight;
  }

  // Render modal separately so it doesn't interfere with content
  const modalEl=document.getElementById('modal-container');
  if(modalEl)modalEl.innerHTML=modalHTML();
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
// Create persistent containers
const toastContainer=document.createElement('div');
toastContainer.id='toast-container';
document.body.appendChild(toastContainer);
const modalContainer=document.createElement('div');
modalContainer.id='modal-container';
document.body.appendChild(modalContainer);

// Override showToast to use container
const _showToast=showToast;
function showToast(msg,type=''){
  if(state.toastTimer)clearTimeout(state.toastTimer);
  state.toast={msg,type};
  const bg=type==='success'?'#1A7A4A':type==='error'?'#D62828':'#002B7F';
  toastContainer.innerHTML=msg?`<div class="toast" style="background:${bg};color:#fff">${esc(msg)}</div>`:'';
  state.toastTimer=setTimeout(()=>{state.toast={msg:'',type:''};toastContainer.innerHTML='';},2500);
}

render();
loadAll();
setInterval(loadAll,30000);
setInterval(()=>{
  // Update clock every minute without full reload
  const el=document.querySelector('.topbar span:last-child');
  if(el){const now=new Date();el.textContent=now.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})+' · '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
},60000);
</script>
