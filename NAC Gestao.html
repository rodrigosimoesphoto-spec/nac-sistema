<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="color-scheme" content="light">
<title>Gestão NAC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;background:#F0F2F8}
body{font-family:'Inter',sans-serif;color:#111827;font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#D4D9ED;border-radius:4px}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;color:#002B7F;font-size:14px">Carregando...</div></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useRef} = React;

// ═══════════════════════════════
// CONFIG
// ═══════════════════════════════
const SB_URL = "https://syuqwuqkbkqpysugltky.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dXF3dXFrYmtxcHlzdWdsdGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNTc5MDUsImV4cCI6MjA5OTYzMzkwNX0.gh_wA901Mos_8Sot_hSf9Uu1zm_1IQSzcnJVPFLskrM";
const EDGE_FN = "https://syuqwuqkbkqpysugltky.supabase.co/functions/v1/nac-ia";
const SB_HEADERS = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

const sb = {
  async get(t,p=''){const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}`,{headers:SB_HEADERS});if(!r.ok)throw new Error(await r.text());return r.json();},
  async post(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:SB_HEADERS,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async patch(t,id,d){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async delete(t,id){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:SB_HEADERS});if(!r.ok)throw new Error(await r.text());},
  async upsert(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
};

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;};
const fmtDateLong=s=>{if(!s)return'';return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});};
const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const CHECKS_DEFAULT={
  abertura:['Conferir e-mails','Conferir Teams','Conferir WhatsApp','Conferir agenda','Verificar ocorrências','Conferir atividades NAC','Verificar pagamentos','Verificar matrículas','Conferir professores','Conferir materiais'],
  encerramento:['Atividades concluídas registradas','Pendências documentadas','Demandas para amanhã','Registros do dia salvos','Setor organizado']
};

// ═══════════════════════════════
// STYLES (inline for iOS safety)
// ═══════════════════════════════
const S = {
  az:'#002B7F', azH:'#001F5C', azL:'#E8EDF8',
  red:'#D62828', redL:'#FDEAEA',
  green:'#1A7A4A', greenL:'#E3F5EC',
  amber:'#B86000', amberL:'#FEF3E2',
  bg:'#F0F2F8', surface:'#FFFFFF', surface2:'#F7F8FC',
  border:'#D4D9ED', border2:'#E8EBF5',
  text:'#111827', text2:'#4B5563', text3:'#9CA3AF',
};

// ═══════════════════════════════
// REUSABLE COMPONENTS
// ═══════════════════════════════
function Btn({onClick,children,color,ghost,sm,style={}}){
  const bg=ghost?'transparent':color||S.az;
  const border=ghost?`1.5px solid ${S.border}`:'none';
  const textColor=ghost?S.text2:'#fff';
  return(
    <button onClick={onClick} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,padding:sm?'6px 12px':'9px 16px',background:bg,color:textColor,border,borderRadius:8,fontSize:sm?11:13,fontWeight:600,fontFamily:'Inter,sans-serif',cursor:'pointer',WebkitAppearance:'none',...style}}>
      {children}
    </button>
  );
}

function Badge({status}){
  const map={'Não iniciado':[S.surface2,S.text3],'Em andamento':[S.azL,S.az],'Aguardando':[S.amberL,S.amber],'Concluído':[S.greenL,S.green],'Alta':[S.redL,S.red],'Média':[S.amberL,S.amber],'Baixa':[S.greenL,S.green],'Identificado':[S.surface2,S.text3],'Em análise':[S.azL,S.az],'Em execução':[S.amberL,S.amber],'Descartado':[S.surface2,S.text3]};
  const[bg,color]=map[status]||[S.surface2,S.text3];
  return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:.3,background:bg,color,whiteSpace:'nowrap'}}>{status}</span>;
}

function KPI({n,label,trend,accent,red,green,amber}){
  const bg=accent?S.az:S.surface;
  const nColor=accent?'#fff':red?S.red:green?S.green:amber?S.amber:S.az;
  const lColor=accent?'rgba(255,255,255,.55)':S.text3;
  const borderLeft=red?`3px solid ${S.red}`:green?`3px solid ${S.green}`:amber?`3px solid ${S.amber}`:'1px solid '+S.border;
  return(
    <div style={{background:bg,border:accent?`1px solid ${S.az}`:`1px solid ${S.border}`,borderLeft,borderRadius:12,padding:'14px 16px',display:'flex',flexDirection:'column',gap:4,boxShadow:'0 1px 2px rgba(0,43,127,.06)'}}>
      <div style={{fontFamily:'Montserrat,sans-serif',fontSize:28,fontWeight:800,lineHeight:1,color:nColor}}>{n}</div>
      <div style={{fontSize:10,fontWeight:600,color:lColor,textTransform:'uppercase',letterSpacing:.6}}>{label}</div>
      {trend&&<div style={{fontSize:11,fontWeight:600,color:accent?'rgba(255,255,255,.7)':S.text3}}>{trend}</div>}
    </div>
  );
}

function Card({children,style={}}){
  return <div style={{background:S.surface,border:`1px solid ${S.border}`,borderRadius:12,boxShadow:'0 1px 2px rgba(0,43,127,.06)',...style}}>{children}</div>;
}

function CardHead({title,right}){
  return(
    <div style={{padding:'14px 16px',borderBottom:`1px solid ${S.border2}`,display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
      <span style={{fontSize:13,fontWeight:700,color:S.text}}>{title}</span>
      {right}
    </div>
  );
}

function FormInput({label,value,onChange,type='text',placeholder=''}){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:4}}>
      <label style={{fontSize:10,fontWeight:700,color:S.text2,textTransform:'uppercase',letterSpacing:.5}}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:'100%',padding:'9px 11px',border:`1.5px solid ${S.border}`,borderRadius:8,fontSize:13,color:S.text,background:S.surface,outline:'none',WebkitAppearance:'none'}}/>
    </div>
  );
}

function FormSelect({label,value,onChange,options}){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:4}}>
      <label style={{fontSize:10,fontWeight:700,color:S.text2,textTransform:'uppercase',letterSpacing:.5}}>{label}</label>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{width:'100%',padding:'9px 11px',border:`1.5px solid ${S.border}`,borderRadius:8,fontSize:13,color:S.text,background:S.surface,outline:'none',WebkitAppearance:'none'}}>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function FormTextarea({label,value,onChange,placeholder='',rows=3}){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:4}}>
      <label style={{fontSize:10,fontWeight:700,color:S.text2,textTransform:'uppercase',letterSpacing:.5}}>{label}</label>
      <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
        style={{width:'100%',padding:'9px 11px',border:`1.5px solid ${S.border}`,borderRadius:8,fontSize:13,color:S.text,background:S.surface,outline:'none',resize:'vertical',lineHeight:1.5,fontFamily:'Inter,sans-serif',WebkitAppearance:'none'}}/>
    </div>
  );
}

function Modal({title,onClose,children,footer}){
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:S.surface,borderRadius:'14px 14px 0 0',width:'100%',maxWidth:540,maxHeight:'92vh',overflowY:'auto',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:S.az,padding:'13px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',borderRadius:'14px 14px 0 0',position:'sticky',top:0,zIndex:1}}>
          <span style={{color:'#fff',fontSize:13,fontWeight:700}}>{title}</span>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.2)',border:'none',color:'#fff',width:26,height:26,borderRadius:'50%',fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',WebkitAppearance:'none'}}>×</button>
        </div>
        <div style={{padding:16,display:'flex',flexDirection:'column',gap:12,flex:1}}>{children}</div>
        {footer&&<div style={{padding:'12px 16px',borderTop:`1px solid ${S.border}`,display:'flex',gap:8,justifyContent:'flex-end'}}>{footer}</div>}
      </div>
    </div>
  );
}

function Toast({msg,type,onHide}){
  useEffect(()=>{if(msg){const t=setTimeout(onHide,2500);return()=>clearTimeout(t);}},[msg]);
  if(!msg)return null;
  const bg=type==='success'?S.green:type==='error'?S.red:S.az;
  return <div style={{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',background:bg,color:'#fff',padding:'10px 18px',borderRadius:8,fontSize:12,fontWeight:700,zIndex:999,whiteSpace:'nowrap',boxShadow:'0 4px 16px rgba(0,43,127,.25)'}}>{msg}</div>;
}

// ═══════════════════════════════
// PANELS
// ═══════════════════════════════
function Dashboard({tasks,melhorias,checkState,checks,onToggleCheck,onNewTask,onOpenTask,onBriefing,briefing,briefingLoading}){
  const today=todayStr();
  const tarefasHoje=tasks.filter(t=>t.data===today);
  const conc=tarefasHoje.filter(t=>t.status==='Concluído').length;
  const atrasadas=tasks.filter(t=>t.data&&t.data<today&&t.status!=='Concluído');
  const melPend=melhorias.filter(m=>['Identificado','Em análise','Em execução'].includes(m.status));
  const h=new Date().getHours();
  const greeting=h<12?'Bom dia! 👋':h<18?'Boa tarde! 👋':'Boa noite! 👋';
  const abertura=checks.abertura||[];
  const states=(checkState[today]||{}).abertura||{};
  const checkDone=abertura.filter((_,i)=>states[i]).length;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontFamily:'Montserrat,sans-serif',fontSize:16,fontWeight:800,color:S.text}}>{greeting}</div>
          <div style={{fontSize:11,color:S.text3,marginTop:2}}>{fmtDateLong(today)}</div>
        </div>
        <Btn onClick={onBriefing} style={{background:S.az}}>✨ Briefing IA</Btn>
      </div>

      {briefingLoading&&<Card><div style={{padding:16,fontSize:13,color:S.text3,fontStyle:'italic'}}>Analisando dados do NAC...</div></Card>}
      {briefing&&!briefingLoading&&(
        <Card>
          <CardHead title="🤖 Briefing do dia" right={<button onClick={()=>onBriefing(true)} style={{background:'none',border:'none',fontSize:16,cursor:'pointer',color:S.text3}}>×</button>}/>
          <div style={{padding:16,fontSize:13,lineHeight:1.7,color:S.text,whiteSpace:'pre-wrap'}}>{briefing}</div>
        </Card>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <KPI n={tarefasHoje.length} label="Tarefas hoje" trend={`${conc} concluídas`} accent/>
        <KPI n={atrasadas.length} label="Atrasadas" trend="requer atenção" red/>
        <KPI n={melPend.length} label="Melhorias" trend="em andamento" amber/>
        <KPI n={checkDone+'/'+abertura.length} label="Checklist" trend="abertura"/>
      </div>

      <Card>
        <CardHead title="📋 Tarefas de hoje" right={<Btn sm onClick={()=>onNewTask(today)}>+ Adicionar</Btn>}/>
        <div style={{padding:16,display:'flex',flexDirection:'column',gap:8}}>
          {tarefasHoje.length===0?<div style={{textAlign:'center',padding:'20px 0',color:S.text3,fontSize:12}}>Sem tarefas para hoje</div>:
            tarefasHoje.sort((a,b)=>a.hora>b.hora?1:-1).map(t=>(
              <TaskItem key={t.id} task={t} onClick={()=>onOpenTask(t)}/>
            ))
          }
        </div>
      </Card>

      {atrasadas.length>0&&(
        <Card>
          <CardHead title="⚠️ Pendências em atraso"/>
          <div style={{padding:16,display:'flex',flexDirection:'column',gap:8}}>
            {atrasadas.slice(0,4).map(t=><TaskItem key={t.id} task={t} onClick={()=>onOpenTask(t)} showDate/>)}
          </div>
        </Card>
      )}

      <Card>
        <CardHead title="✅ Checklist de abertura" right={<span style={{background:S.surface2,color:S.text3,padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:700}}>{checkDone}/{abertura.length}</span>}/>
        <div style={{padding:16}}>
          {abertura.slice(0,6).map((item,i)=>(
            <div key={i} onClick={()=>onToggleCheck('abertura',i)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<Math.min(abertura.length,6)-1?`1px solid ${S.border2}`:'none',cursor:'pointer'}}>
              <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${states[i]?S.az:S.border}`,background:states[i]?S.az:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {states[i]&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}
              </div>
              <span style={{fontSize:13,color:states[i]?S.text3:S.text,textDecoration:states[i]?'line-through':'none',flex:1}}>{item}</span>
            </div>
          ))}
          {abertura.length>6&&<div style={{fontSize:11,color:S.text3,textAlign:'center',marginTop:8}}>+{abertura.length-6} itens na Rotina Diária</div>}
        </div>
      </Card>
    </div>
  );
}

function TaskItem({task,onClick,showDate}){
  const prioColor={'Alta':S.red,'Média':S.amber,'Baixa':S.green}[task.prioridade]||S.text3;
  return(
    <div onClick={onClick} style={{background:S.surface,border:`1px solid ${S.border}`,borderRadius:8,padding:'10px 12px',display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer',opacity:task.status==='Concluído'?.6:1}}>
      <div style={{width:8,height:8,borderRadius:'50%',background:prioColor,marginTop:5,flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:600,color:S.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.titulo}</div>
        <div style={{fontSize:10,color:S.text3,marginTop:2,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
          {showDate&&<span>📅 {fmtDate(task.data)}</span>}
          {task.hora&&<span>🕐 {task.hora}</span>}
          <span>👤 {task.responsavel}</span>
          <Badge status={task.status}/>
        </div>
      </div>
    </div>
  );
}

function Rotina({checkState,checks,logs,rotinaDay,onChangeDay,onToggleCheck,onAddCheck,onSaveLog,stars,onSetStar}){
  const [logModal,setLogModal]=useState(false);
  const [logTipo,setLogTipo]=useState('ocorrencia');
  const [logTexto,setLogTexto]=useState('');
  const states=checkState[rotinaDay]||{};
  const todayLogs=(logs[rotinaDay]||[]).slice().reverse();
  const tipoLabel={ocorrencia:'🔴 Ocorrência',decisao:'🔵 Decisão',reuniao:'🟢 Reunião',ideia:'🟣 Ideia',observacao:'🟡 Observação'};
  const tipoBorder={ocorrencia:S.red,decisao:S.az,reuniao:S.green,ideia:'#5B2D8E',observacao:S.amber};

  function handleSaveLog(){
    if(!logTexto.trim())return;
    onSaveLog({tipo:logTipo,texto:logTexto});
    setLogTexto('');setLogModal(false);
  }

  function Checklist({section,title}){
    const items=checks[section]||[];
    const sec=states[section]||{};
    const done=items.filter((_,i)=>sec[i]).length;
    const pct=items.length?Math.round(done/items.length*100):0;
    return(
      <Card>
        <CardHead title={title} right={<button onClick={()=>onAddCheck(section)} style={{background:'none',border:`1px solid ${S.border}`,borderRadius:6,width:26,height:26,fontSize:14,cursor:'pointer',color:S.text2,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>}/>
        <div style={{padding:16}}>
          {items.map((item,i)=>(
            <div key={i} onClick={()=>onToggleCheck(rotinaDay,section,i)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<items.length-1?`1px solid ${S.border2}`:'none',cursor:'pointer'}}>
              <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sec[i]?S.az:S.border}`,background:sec[i]?S.az:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {sec[i]&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}
              </div>
              <span style={{fontSize:13,color:sec[i]?S.text3:S.text,textDecoration:sec[i]?'line-through':'none',flex:1}}>{item}</span>
            </div>
          ))}
          <div style={{marginTop:10}}>
            <div style={{height:6,background:S.border2,borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',width:pct+'%',background:S.az,borderRadius:3,transition:'width .4s'}}/>
            </div>
            <div style={{fontSize:10,color:S.text3,marginTop:4,textAlign:'right'}}>{done}/{items.length} concluídos</div>
          </div>
        </div>
      </Card>
    );
  }

  const starVal=(states._stars)||0;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:'Montserrat,sans-serif',fontSize:16,fontWeight:800,color:S.text}}>Rotina Diária</div>
          <div style={{fontSize:11,color:S.text3}}>{fmtDateLong(rotinaDay)}</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <Btn ghost sm onClick={()=>onChangeDay(-1)}>‹</Btn>
          <Btn ghost sm onClick={()=>onChangeDay(1)}>›</Btn>
        </div>
      </div>

      <Checklist section="abertura" title="🌅 Antes de iniciar"/>
      <Checklist section="encerramento" title="🌆 Encerramento"/>

      <Card>
        <CardHead title="⭐ Produtividade do dia"/>
        <div style={{padding:16,display:'flex',gap:8}}>
          {[1,2,3,4,5].map(i=>(
            <button key={i} onClick={()=>onSetStar(rotinaDay,i)} style={{fontSize:28,background:'none',border:'none',cursor:'pointer',color:starVal>=i?'#F59E0B':S.border,padding:0}}>★</button>
          ))}
        </div>
      </Card>

      <Card>
        <CardHead title="📝 Registros do dia" right={<Btn sm onClick={()=>setLogModal(true)}>+ Registrar</Btn>}/>
        <div style={{padding:16}}>
          {todayLogs.length===0?<div style={{textAlign:'center',padding:'20px 0',color:S.text3,fontSize:12}}>Nenhum registro ainda</div>:
            todayLogs.map((l,i)=>(
              <div key={i} style={{padding:'10px 12px',background:S.surface2,borderRadius:8,borderLeft:`3px solid ${tipoBorder[l.tipo]||S.border}`,marginBottom:8}}>
                <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:.5,color:S.text3,marginBottom:3}}>{tipoLabel[l.tipo]||l.tipo}</div>
                <div style={{fontSize:13,color:S.text,lineHeight:1.5}}>{l.texto}</div>
                <div style={{fontSize:10,color:S.text3,marginTop:4}}>{l.hora}</div>
              </div>
            ))
          }
        </div>
      </Card>

      {logModal&&(
        <Modal title="Novo Registro" onClose={()=>setLogModal(false)} footer={<><Btn ghost onClick={()=>setLogModal(false)}>Cancelar</Btn><Btn onClick={handleSaveLog}>Registrar</Btn></>}>
          <FormSelect label="Tipo" value={logTipo} onChange={setLogTipo} options={['ocorrencia','decisao','reuniao','ideia','observacao']}/>
          <FormTextarea label="Descrição" value={logTexto} onChange={setLogTexto} placeholder="Descreva o que aconteceu..." rows={4}/>
        </Modal>
      )}
    </div>
  );
}

function RotinaWeekView({tasks,checkState,checks,logs,onToggleCheck,onNewTask,onOpenTask,onSaveLog,onSetStar,weekOffset,onChangeWeek}){
  const [logDay,setLogDay]=useState(null);
  const [logTipo,setLogTipo]=useState('ocorrencia');
  const [logTexto,setLogTexto]=useState('');
  const today=todayStr();

  function getWeekDates(offset){
    const now=new Date(),day=now.getDay(),mon=new Date(now);
    mon.setDate(now.getDate()-day+1+offset*7);
    return[0,1,2,3,4].map(i=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  }

  const dates=getWeekDates(weekOffset);
  const start=dates[0].toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  const end=dates[4].toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});

  const tipoLabel={ocorrencia:'🔴',decisao:'🔵',reuniao:'🟢',ideia:'🟣',observacao:'🟡'};
  const tipoBorder={ocorrencia:S.red,decisao:S.az,reuniao:S.green,ideia:'#5B2D8E',observacao:S.amber};

  function handleSaveLog(){
    if(!logTexto.trim())return;
    onSaveLog(logDay,{tipo:logTipo,texto:logTexto});
    setLogTexto('');setLogDay(null);
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontFamily:'Montserrat,sans-serif',fontSize:16,fontWeight:800,color:S.text}}>Rotina Semanal</div>
          <div style={{fontSize:11,color:S.text3}}>{start} a {end}</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <Btn ghost sm onClick={()=>onChangeWeek(-1)}>‹</Btn>
          <Btn ghost sm onClick={()=>onChangeWeek(0)}>Hoje</Btn>
          <Btn ghost sm onClick={()=>onChangeWeek(1)}>›</Btn>

      {/* Horizontal scroll container */}
      <div style={{overflowX:'auto',paddingBottom:8}}>
        <div style={{display:'flex',gap:10,minWidth:'max-content'}}>
          {dates.map(d=>{
            const ds=d.toISOString().slice(0,10);
            const isToday=ds===today;
            const states=(checkState[ds]||{});
            const abertura=checks.abertura||[];
            const encerramento=checks.encerramento||[];
            const abDone=abertura.filter((_,i)=>(states.abertura||{})[i]).length;
            const encDone=encerramento.filter((_,i)=>(states.encerramento||{})[i]).length;
            const dayTasks=tasks.filter(t=>t.data===ds);

            return(
              <div key={ds} style={{width:280,flexShrink:0,display:'flex',flexDirection:'column',gap:8}}>
                {/* Day header */}
                <div style={{background:isToday?S.az:S.surface,border:`1.5px solid ${isToday?S.az:S.border}`,borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div>
                    <div style={{fontFamily:'Montserrat,sans-serif',fontSize:13,fontWeight:800,color:isToday?'#fff':S.text}}>{DIAS[d.getDay()]+'-feira'}</div>
                    <div style={{fontSize:10,color:isToday?'rgba(255,255,255,.7)':S.text3,marginTop:1}}>{d.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'})}</div>
                  </div>
                  {isToday&&<span style={{background:'rgba(255,255,255,.2)',color:'#fff',fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:5}}>HOJE</span>}
                </div>

                {/* Checklist abertura */}
                <div style={{background:S.surface,border:`1px solid ${S.border}`,borderRadius:10,overflow:'hidden'}}>
                  <div style={{padding:'8px 12px',borderBottom:`1px solid ${S.border2}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:11,fontWeight:700,color:S.text}}>🌅 Abertura</span>
                    <span style={{fontSize:10,color:S.text3,fontWeight:600}}>{abDone}/{abertura.length}</span>
                  </div>
                  <div style={{padding:'8px 12px'}}>
                    {abertura.map((item,i)=>(
                      <div key={i} onClick={()=>onToggleCheck(ds,'abertura',i)} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:i<abertura.length-1?`1px solid ${S.border2}`:'none',cursor:'pointer'}}>
                        <div style={{width:15,height:15,borderRadius:3,border:`2px solid ${(states.abertura||{})[i]?S.az:S.border}`,background:(states.abertura||{})[i]?S.az:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>

                        <span style={{fontSize:11,color:(states.abertura||{})[i]?S.text3:S.text,textDecoration:(states.abertura||{})[i]?'line-through':'none',flex:1,lineHeight:1.3}}>{item}</span>

                    {/* Progress */}
                    <div style={{marginTop:8}}>

                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:11,fontWeight:600,color:t.status==='Concluído'?S.text3:S.text,textDecoration:t.status==='Concluído'?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.titulo}</div>
                              <div style={{fontSize:9,color:S.text3,display:'flex',gap:4,alignItems:'center',marginTop:1}}>

                {/* Registros */}
                <div style={{background:S.surface,border:`1px solid ${S.border}`,borderRadius:10,overflow:'hidden'}}>
                  <div style={{padding:'8px 12px',borderBottom:`1px solid ${S.border2}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:11,fontWeight:700,color:S.text}}>📝 Registros</span>
                    <button onClick={()=>setLogDay(ds)} style={{background:'none',border:`1px solid ${S.border}`,borderRadius:5,width:20,height:20,fontSize:12,cursor:'pointer',color:S.text2,display:'flex',alignItems:'center',justifyContent:'center',WebkitAppearance:'none'}}>+</button>

                  <div style={{padding:'8px 12px',display:'flex',flexDirection:'column',gap:5}}>
                    {dayLogs.length===0?
                      <div style={{fontSize:11,color:S.text3,textAlign:'center',padding:'8px 0'}}>Sem registros</div>:
                      dayLogs.slice().reverse().map((l,i)=>(
                        <div key={i} style={{padding:'6px 8px',background:S.surface2,borderRadius:6,borderLeft:`2px solid ${tipoBorder[l.tipo]||S.border}`}}>
                          <div style={{fontSize:9,fontWeight:700,color:S.text3}}>{tipoLabel[l.tipo]} {l.hora}</div>
                          <div style={{fontSize:11,color:S.text,lineHeight:1.4,marginTop:2}}>{l.texto.slice(0,80)}{l.texto.length>80?'…':''}</div>

                      ))

                  </div>

                {/* Encerramento */}
                <div style={{background:S.surface,border:`1px solid ${S.border}`,borderRadius:10,overflow:'hidden'}}>
                  <div style={{padding:'8px 12px',borderBottom:`1px solid ${S.border2}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:11,fontWeight:700,color:S.text}}>🌆 Encerramento</span>
                    <span style={{fontSize:10,color:S.text3,fontWeight:600}}>{encDone}/{encerramento.length}</span>
                  </div>
                  <div style={{padding:'8px 12px'}}>
                    {encerramento.map((item,i)=>(
                      <div key={i} onClick={()=>onToggleCheck(ds,'encerramento',i)} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:i<encerramento.length-1?`1px solid ${S.border2}`:'none',cursor:'pointer'}}>
                        <div style={{width:15,height:15,borderRadius:3,border:`2px solid ${(states.encerramento||{})[i]?S.green:S.border}`,background:(states.encerramento||{})[i]?S.green:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          {(states.encerramento||{})[i]&&<span style={{color:'#fff',fontSize:9,fontWeight:700}}>✓</span>}
                        </div>
                        <span style={{fontSize:11,color:(states.encerramento||{})[i]?S.text3:S.text,textDecoration:(states.encerramento||{})[i]?'line-through':'none',flex:1,lineHeight:1.3}}>{item}</span>
                      </div>
                    ))}
                    <div style={{marginTop:8}}>
                      <div style={{height:4,background:S.border2,borderRadius:2,overflow:'hidden'}}>
                        <div style={{height:'100%',width:(encerramento.length?Math.round(encDone/encerramento.length*100):0)+'%',background:S.green,borderRadius:2}}/>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Produtividade */}
                <div style={{background:S.surface,border:`1px solid ${S.border}`,borderRadius:10,padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:11,fontWeight:700,color:S.text}}>⭐ Produtividade</span>
                  <div style={{display:'flex',gap:2}}>
                    {[1,2,3,4,5].map(i=>(
                      <button key={i} onClick={()=>onSetStar(ds,i)} style={{fontSize:16,background:'none',border:'none',cursor:'pointer',color:starVal>=i?'#F59E0B':S.border,padding:0,WebkitAppearance:'none'}}>★</button>

      {/* Log Modal */}
      {logDay&&(
        <Modal title={`Registrar — ${fmtDate(logDay)}`} onClose={()=>setLogDay(null)}
          footer={<><Btn ghost onClick={()=>setLogDay(null)}>Cancelar</Btn><Btn onClick={handleSaveLog}>Registrar</Btn></>}>
          <FormSelect label="Tipo" value={logTipo} onChange={setLogTipo} options={['ocorrencia','decisao','reuniao','ideia','observacao']}/>
          <FormTextarea label="Descrição" value={logTexto} onChange={setLogTexto} placeholder="Descreva o que aconteceu..." rows={4}/>
        </Modal>
      )}
    </div>
  );
}

function Semana({tasks,weekOffset,onChangeWeek,onNewTask,onOpenTask}){
  const dates=getWeekDates(weekOffset);
  const start=dates[0].toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  const end=dates[4].toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  const today=todayStr();
  const [filterStatus,setFilterStatus]=useState('');
  const [filterResp,setFilterResp]=useState('');

  function getWeekDates(offset){
    const now=new Date(),day=now.getDay(),mon=new Date(now);
    mon.setDate(now.getDate()-day+1+offset*7);
    return[0,1,2,3,4].map(i=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  }

  let allTasks=tasks.filter(t=>dates.map(d=>d.toISOString().slice(0,10)).includes(t.data));
  if(filterStatus)allTasks=allTasks.filter(t=>t.status===filterStatus);
  if(filterResp)allTasks=allTasks.filter(t=>t.responsavel===filterResp);
  allTasks.sort((a,b)=>a.data===b.data?a.hora>b.hora?1:-1:a.data>b.data?1:-1);

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontFamily:'Montserrat,sans-serif',fontSize:16,fontWeight:800,color:S.text}}>Semana</div>
          <div style={{fontSize:11,color:S.text3}}>{start} a {end}</div>
        </div>
        <Btn sm onClick={()=>onNewTask()}>+ Nova tarefa</Btn>
      </div>

      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4}}>
        <Btn ghost sm onClick={()=>onChangeWeek(-1)}>‹ Anterior</Btn>
        <Btn ghost sm onClick={()=>onChangeWeek(0)}>Hoje</Btn>
        <Btn ghost sm onClick={()=>onChangeWeek(1)}>Próxima ›</Btn>
      </div>

      {/* Day columns — horizontal scroll */}
      <div style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:4}}>
        {dates.map(d=>{
          const ds=d.toISOString().slice(0,10);
          const isToday=ds===today;
          const dayTasks=tasks.filter(t=>t.data===ds);
          return(
            <div key={ds} style={{minWidth:150,background:S.surface,border:`1px solid ${isToday?S.az:S.border}`,borderRadius:12,flexShrink:0,display:'flex',flexDirection:'column'}}>
              <div style={{padding:'10px 12px',borderBottom:`1px solid ${S.border2}`,background:isToday?S.azL:'transparent',borderRadius:'12px 12px 0 0',display:'flex',justifyContent:'space-between'}}>
                <span style={{fontSize:11,fontWeight:700,color:isToday?S.az:S.text2,textTransform:'uppercase'}}>{DIAS[d.getDay()]}</span>
                <span style={{fontSize:10,color:isToday?S.az:S.text3,fontWeight:isToday?700:400}}>{d.getDate()}/{String(d.getMonth()+1).padStart(2,'0')}</span>
              </div>
              <div style={{padding:8,display:'flex',flexDirection:'column',gap:6,flex:1}}>
                {dayTasks.map(t=>(
                  <div key={t.id} onClick={()=>onOpenTask(t)} style={{background:S.surface2,border:`1px solid ${S.border2}`,borderRadius:6,padding:'7px 9px',cursor:'pointer'}}>
                    <div style={{fontSize:12,fontWeight:600,color:t.status==='Concluído'?S.text3:S.text,textDecoration:t.status==='Concluído'?'line-through':'none'}}>{t.titulo}</div>
                    {t.hora&&<div style={{fontSize:10,color:S.text3,marginTop:2}}>{t.hora}</div>}
                  </div>
                ))}
              </div>
              <div onClick={()=>onNewTask(ds)} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 10px',color:S.text3,fontSize:11,fontWeight:600,cursor:'pointer',borderTop:`1px solid ${S.border2}`}}>
                <span>+</span><span>Adicionar</span>
              </div>
            </div>
          );
        })}
      </div>

      {/* List */}
      <Card>
        <CardHead title="Lista completa" right={
          <div style={{display:'flex',gap:6}}>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{fontSize:11,padding:'4px 8px',border:`1px solid ${S.border}`,borderRadius:6,background:S.surface,color:S.text,WebkitAppearance:'none'}}>
              <option value="">Todos</option>
              <option>Não iniciado</option><option>Em andamento</option><option>Aguardando</option><option>Concluído</option>
            </select>
            <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} style={{fontSize:11,padding:'4px 8px',border:`1px solid ${S.border}`,borderRadius:6,background:S.surface,color:S.text,WebkitAppearance:'none'}}>
              <option value="">Todos</option><option>Coordenador</option><option>Assistente</option>
            </select>
          </div>
        }/>
        <div style={{padding:16,display:'flex',flexDirection:'column',gap:8}}>
          {allTasks.length===0?<div style={{textAlign:'center',padding:'20px 0',color:S.text3,fontSize:12}}>Sem tarefas nesta semana</div>:
            allTasks.map(t=><TaskItem key={t.id} task={t} onClick={()=>onOpenTask(t)} showDate/>)}
        </div>
      </Card>
    </div>
  );
}

function IAPanel({tasks,melhorias,checkState,checks,logs}){
  const [msgs,setMsgs]=useState([{role:'bot',text:'Olá! Sou o assistente do NAC. Estou conectado ao banco em tempo real. O que precisa?'}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const msgsRef=useRef(null);

  useEffect(()=>{if(msgsRef.current)msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs]);

  function buildContext(){
    const today=todayStr();
    const tj=tasks.filter(t=>t.data===today);
    const at=tasks.filter(t=>t.data&&t.data<today&&t.status!=='Concluído');
    const lh=logs[today]||[];
    const cs=(checkState[today]||{});
    const ad=(checks.abertura||[]).filter((_,i)=>(cs.abertura||{})[i]).length;
    const ma=melhorias.filter(m=>m.status!=='Concluído'&&m.status!=='Descartado');
    return`DATA: ${fmtDateLong(today)}
TAREFAS HOJE (${tj.length}): ${tj.map(t=>`[${t.status}] ${t.titulo} | ${t.responsavel} | ${t.prioridade}`).join(' / ')||'Nenhuma'}
ATRASADAS (${at.length}): ${at.map(t=>`${fmtDate(t.data)} ${t.titulo}`).join(' / ')||'Nenhuma'}
CHECKLIST ABERTURA: ${ad}/${(checks.abertura||[]).length}
LOGS HOJE (${lh.length}): ${lh.map(l=>`[${l.tipo}] ${l.texto}`).join(' / ')||'Nenhum'}
MELHORIAS ATIVAS (${ma.length}): ${ma.slice(0,4).map(m=>`[${m.prioridade}] ${(m.problema||'').slice(0,50)}`).join(' / ')||'Nenhuma'}`;
  }

  async function send(msg){
    if(!msg.trim()||loading)return;
    const userMsg=msg;
    setInput('');
    setMsgs(m=>[...m,{role:'user',text:userMsg}]);
    setLoading(true);
    try{
      const history=msgs.slice(-6).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
      const system=`Você é o assistente de gestão do NAC de um colégio Marista. Português direto, sem formalidade. Objetivo e prático.\n\n${buildContext()}`;
      const r=await fetch(EDGE_FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},body:JSON.stringify({system,messages:[...history,{role:'user',content:userMsg}]})});
      const d=await r.json();
      const reply=d.content?.map(c=>c.text||'').join('')||'Erro na resposta.';
      setMsgs(m=>[...m,{role:'bot',text:reply}]);
    }catch(e){
      setMsgs(m=>[...m,{role:'bot',text:'Erro ao conectar com a IA. Tente novamente.'}]);
    }
    setLoading(false);
  }

  const quickActions=[
    {label:'📊 Briefing do dia',msg:'Faça um briefing completo do meu dia, analisando tarefas, checklists e registros.'},
    {label:'⚠️ Análise de riscos',msg:'Analise as tarefas da semana e identifique riscos e prioridades.'},
    {label:'🔴 Tarefas em atraso',msg:'Quais tarefas estão atrasadas? Liste com prioridade de ação.'},
    {label:'🎯 Foco agora',msg:'Quais são as 3 coisas mais importantes que devo focar agora?'},
    {label:'💡 Priorizar melhorias',msg:'Analise as melhorias e sugira por onde começar.'},
    {label:'📝 Resumo da semana',msg:'Resuma a semana: o que foi concluído e o que ficou pendente.'},
  ];

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{fontFamily:'Montserrat,sans-serif',fontSize:16,fontWeight:800,color:S.text}}>Assistente IA</div>

      <Card style={{display:'flex',flexDirection:'column'}}>
        <div style={{background:S.az,padding:'12px 14px',display:'flex',alignItems:'center',gap:8,borderRadius:'12px 12px 0 0'}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🤖</div>
          <div>
            <div style={{color:'#fff',fontSize:13,fontWeight:700}}>Assistente NAC</div>
            <div style={{color:'rgba(255,255,255,.55)',fontSize:10}}>Dados em tempo real · Supabase</div>
          </div>
        </div>
        <div ref={msgsRef} style={{padding:14,display:'flex',flexDirection:'column',gap:10,minHeight:280,maxHeight:380,overflowY:'auto'}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{maxWidth:'88%',padding:'10px 12px',borderRadius:10,fontSize:13,lineHeight:1.55,alignSelf:m.role==='user'?'flex-end':'flex-start',background:m.role==='user'?S.az:S.azL,color:m.role==='user'?'#fff':S.text}}>
              {m.text}
            </div>
          ))}
          {loading&&<div style={{alignSelf:'flex-start',background:S.surface2,color:S.text3,padding:'10px 12px',borderRadius:10,fontSize:13,fontStyle:'italic'}}>Analisando...</div>}
        </div>
        <div style={{borderTop:`1px solid ${S.border}`,padding:'10px 12px',display:'flex',gap:8,alignItems:'flex-end'}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="Pergunte sobre o NAC..." rows={1}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(input);}}}
            style={{flex:1,border:`1.5px solid ${S.border}`,borderRadius:8,padding:'8px 11px',fontSize:13,color:S.text,background:S.surface,outline:'none',resize:'none',fontFamily:'Inter,sans-serif',lineHeight:1.4}}/>
          <button onClick={()=>send(input)} disabled={loading} style={{background:S.az,color:'#fff',border:'none',borderRadius:8,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,cursor:'pointer',flexShrink:0,opacity:loading?.4:1}}>➤</button>
        </div>
      </Card>

      <Card>
        <CardHead title="⚡ Ações rápidas"/>
        <div style={{padding:16,display:'flex',flexDirection:'column',gap:8}}>
          {quickActions.map((a,i)=>(
            <button key={i} onClick={()=>send(a.msg)} style={{textAlign:'left',padding:'10px 14px',background:S.surface2,border:`1px solid ${S.border}`,borderRadius:8,fontSize:13,color:S.text,cursor:'pointer',fontFamily:'Inter,sans-serif',WebkitAppearance:'none'}}>
              {a.label}
            </button>
          ))}
        </div>
      </Card>
    </div>
  );
}

function Melhorias({melhorias,onNew,onOpen}){
  const [fStatus,setFStatus]=useState('');
  const [fPrio,setFPrio]=useState('');
  const prioOrder={'Alta':0,'Média':1,'Baixa':2};
  let list=melhorias.filter(m=>{if(fStatus&&m.status!==fStatus)return false;if(fPrio&&m.prioridade!==fPrio)return false;return true;});
  list=[...list].sort((a,b)=>(prioOrder[a.prioridade]||1)-(prioOrder[b.prioridade]||1));
  const total=melhorias.length,emAnd=melhorias.filter(m=>m.status==='Em execução').length,conc=melhorias.filter(m=>m.status==='Concluído').length,alta=melhorias.filter(m=>m.prioridade==='Alta'&&m.status!=='Concluído').length;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div style={{fontFamily:'Montserrat,sans-serif',fontSize:16,fontWeight:800,color:S.text}}>Melhorias</div>
        <Btn sm onClick={onNew}>+ Nova</Btn>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <KPI n={total} label="Total"/>
        <KPI n={emAnd} label="Em execução" amber/>
        <KPI n={conc} label="Concluídas" green/>
        <KPI n={alta} label="Alta prioridade" red/>
      </div>

      <div style={{display:'flex',gap:8}}>
        <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{flex:1,fontSize:12,padding:'8px 10px',border:`1px solid ${S.border}`,borderRadius:8,background:S.surface,color:S.text,WebkitAppearance:'none'}}>
          <option value="">Todos os status</option>
          <option>Identificado</option><option>Em análise</option><option>Em execução</option><option>Concluído</option><option>Descartado</option>
        </select>
        <select value={fPrio} onChange={e=>setFPrio(e.target.value)} style={{flex:1,fontSize:12,padding:'8px 10px',border:`1px solid ${S.border}`,borderRadius:8,background:S.surface,color:S.text,WebkitAppearance:'none'}}>
          <option value="">Todas prioridades</option>
          <option>Alta</option><option>Média</option><option>Baixa</option>
        </select>
      </div>

      {list.length===0?<Card><div style={{padding:28,textAlign:'center',color:S.text3,fontSize:12}}>Nenhuma melhoria. Clique em + Nova.</div></Card>:
        list.map(m=>{
          const prioColor={'Alta':S.red,'Média':S.amber,'Baixa':S.green}[m.prioridade]||S.text3;
          return(
            <Card key={m.id} style={{cursor:'pointer'}} >
              <div onClick={()=>onOpen(m)} style={{padding:'12px 14px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:prioColor,flexShrink:0}}/>
                  <span style={{fontSize:13,fontWeight:700,color:S.text,flex:1}}>{(m.problema||'').slice(0,70)}{(m.problema||'').length>70?'…':''}</span>
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                  <Badge status={m.prioridade}/><Badge status={m.status}/>
                  <span style={{fontSize:10,color:S.text3}}>👤 {m.responsavel}</span>
                  {m.prazo&&<span style={{fontSize:10,color:S.text3}}>📅 {fmtDate(m.prazo)}</span>}
                </div>
                {m.sugestao&&<div style={{fontSize:12,color:S.text2,lineHeight:1.5,marginTop:8,paddingTop:8,borderTop:`1px solid ${S.border2}`}}>💬 {m.sugestao}</div>}
              </div>
            </Card>
          );
        })
      }
    </div>
  );
}

// ═══════════════════════════════
// TASK MODAL
// ═══════════════════════════════
function TaskModal({task,defaultDate,onClose,onSave,onDelete}){
  const [titulo,setTitulo]=useState(task?.titulo||'');
  const [descricao,setDescricao]=useState(task?.descricao||'');
  const [data,setData]=useState(task?.data||defaultDate||todayStr());
  const [hora,setHora]=useState(task?.hora||'');
  const [responsavel,setResponsavel]=useState(task?.responsavel||'Coordenador');
  const [prioridade,setPrioridade]=useState(task?.prioridade||'Média');
  const [status,setStatus]=useState(task?.status||'Não iniciado');
  const [categoria,setCategoria]=useState(task?.categoria||'');
  const [obs,setObs]=useState(task?.observacoes||'');

  function handleSave(){
    if(!titulo.trim())return;
    onSave({id:task?.id||uid(),titulo,descricao,data,hora,responsavel,prioridade,status,categoria,observacoes:obs});
  }

  return(
    <Modal title={task?'Editar Tarefa':'Nova Tarefa'} onClose={onClose}
      footer={<>
        <Btn ghost onClick={onClose}>Cancelar</Btn>
        {task&&<Btn onClick={()=>onDelete(task.id)} style={{background:S.redL,color:S.red}}>Excluir</Btn>}
        <Btn onClick={handleSave}>Salvar</Btn>
      </>}>
      <FormInput label="Título" value={titulo} onChange={setTitulo} placeholder="O que precisa ser feito?"/>
      <FormTextarea label="Descrição" value={descricao} onChange={setDescricao} placeholder="Detalhes..."/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <FormInput label="Data" value={data} onChange={setData} type="date"/>
        <FormInput label="Horário" value={hora} onChange={setHora} type="time"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <FormSelect label="Responsável" value={responsavel} onChange={setResponsavel} options={['Coordenador','Assistente','Ambos']}/>
        <FormSelect label="Prioridade" value={prioridade} onChange={setPrioridade} options={['Alta','Média','Baixa']}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <FormSelect label="Status" value={status} onChange={setStatus} options={['Não iniciado','Em andamento','Aguardando','Concluído']}/>
        <FormInput label="Categoria" value={categoria} onChange={setCategoria} placeholder="Ex: Administrativo"/>
      </div>
      <FormTextarea label="Observações" value={obs} onChange={setObs} rows={2}/>
    </Modal>
  );
}

// ═══════════════════════════════
// MELHORIA MODAL
// ═══════════════════════════════
function MelhoriaModal({mel,onClose,onSave,onDelete}){
  const [problema,setProblema]=useState(mel?.problema||'');
  const [sugestao,setSugestao]=useState(mel?.sugestao||'');
  const [prioridade,setPrioridade]=useState(mel?.prioridade||'Média');
  const [impacto,setImpacto]=useState(mel?.impacto||'Médio');
  const [responsavel,setResponsavel]=useState(mel?.responsavel||'Coordenador');
  const [prazo,setPrazo]=useState(mel?.prazo||'');
  const [status,setStatus]=useState(mel?.status||'Identificado');

  function handleSave(){
    if(!problema.trim())return;
    onSave({id:mel?.id||uid(),problema,sugestao,prioridade,impacto,responsavel,prazo,status});
  }

  return(
    <Modal title={mel?'Editar Melhoria':'Nova Melhoria'} onClose={onClose}
      footer={<>
        <Btn ghost onClick={onClose}>Cancelar</Btn>
        {mel&&<Btn onClick={()=>onDelete(mel.id)} style={{background:S.redL,color:S.red}}>Excluir</Btn>}
        <Btn onClick={handleSave}>Salvar</Btn>
      </>}>
      <FormTextarea label="Problema identificado" value={problema} onChange={setProblema} placeholder="Qual é o problema?"/>
      <FormTextarea label="Sugestão" value={sugestao} onChange={setSugestao} placeholder="O que pode ser feito?"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <FormSelect label="Prioridade" value={prioridade} onChange={setPrioridade} options={['Alta','Média','Baixa']}/>
        <FormSelect label="Impacto" value={impacto} onChange={setImpacto} options={['Alto','Médio','Baixo']}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <FormSelect label="Responsável" value={responsavel} onChange={setResponsavel} options={['Coordenador','Assistente','Equipe']}/>
        <FormInput label="Prazo" value={prazo} onChange={setPrazo} type="date"/>
      </div>
      <FormSelect label="Status" value={status} onChange={setStatus} options={['Identificado','Em análise','Em execução','Concluído','Descartado']}/>
    </Modal>
  );
}

// ═══════════════════════════════
// MAIN APP
// ═══════════════════════════════
function App(){
  const [tab,setTab]=useState('dashboard');
  const [sideOpen,setSideOpen]=useState(false);
  const [tasks,setTasks]=useState([]);
  const [melhorias,setMelhorias]=useState([]);
  const [checkState,setCheckState]=useState({});
  const [logs,setLogs]=useState({});
  const [checks]=useState(()=>JSON.parse(localStorage.getItem('nac_checks')||JSON.stringify(CHECKS_DEFAULT)));
  const [syncing,setSyncing]=useState(false);
  const [syncOk,setSyncOk]=useState(true);
  const [toast,setToast]=useState({msg:'',type:''});
  const [taskModal,setTaskModal]=useState(null); // {task?:Task, date?:string}
  const [melModal,setMelModal]=useState(null);
  const [weekOffset,setWeekOffset]=useState(0);
  const [rotinaDay,setRotinaDay]=useState(todayStr());
  const [briefing,setBriefing]=useState('');
  const [briefingLoading,setBriefingLoading]=useState(false);

  function showToast(msg,type=''){setToast({msg,type});setTimeout(()=>setToast({msg:'',type:''}),2500);}

  async function loadAll(){
    setSyncing(true);
    try{
      const[t,m,cs,l]=await Promise.all([
        sb.get('tarefas','order=criado_em.desc'),
        sb.get('melhorias','order=criado_em.desc'),
        sb.get('checklist_state'),
        sb.get('logs','order=criado_em.desc')
      ]);
      setTasks(t||[]);
      setMelhorias(m||[]);
      const cs2={};
      (cs||[]).forEach(r=>{
        if(!cs2[r.data])cs2[r.data]={};
        if(!cs2[r.data][r.secao])cs2[r.data][r.secao]={};
        if(r.secao==='stars')cs2[r.data]._stars=r.concluido?5:0;
        else cs2[r.data][r.secao][r.indice]=r.concluido;
      });
      setCheckState(cs2);
      const l2={};
      (l||[]).forEach(r=>{if(!l2[r.data])l2[r.data]=[];l2[r.data].push(r);});
      setLogs(l2);
      setSyncOk(true);
    }catch(e){setSyncOk(false);}
    setSyncing(false);
  }

  useEffect(()=>{loadAll();const id=setInterval(loadAll,30000);return()=>clearInterval(id);},[]);

  // Task ops
  async function saveTask(item){
    try{
      if(tasks.find(t=>t.id===item.id)){
        await sb.patch('tarefas',item.id,item);
        setTasks(ts=>ts.map(t=>t.id===item.id?{...t,...item}:t));
      } else {
        await sb.post('tarefas',item);
        setTasks(ts=>[item,...ts]);
      }
      setTaskModal(null);showToast('Tarefa salva!','success');
    }catch(e){showToast('Erro ao salvar','error');}
  }
  async function deleteTask(id){
    try{await sb.delete('tarefas',id);setTasks(ts=>ts.filter(t=>t.id!==id));setTaskModal(null);showToast('Excluída.');}
    catch(e){showToast('Erro ao excluir','error');}
  }

  // Melhoria ops
  async function saveMelhoria(item){
    try{
      if(melhorias.find(m=>m.id===item.id)){
        await sb.patch('melhorias',item.id,item);
        setMelhorias(ms=>ms.map(m=>m.id===item.id?{...m,...item}:m));
      } else {
        await sb.post('melhorias',item);
        setMelhorias(ms=>[item,...ms]);
      }
      setMelModal(null);showToast('Melhoria salva!','success');
    }catch(e){showToast('Erro ao salvar','error');}
  }
  async function deleteMelhoria(id){
    try{await sb.delete('melhorias',id);setMelhorias(ms=>ms.filter(m=>m.id!==id));setMelModal(null);showToast('Excluída.');}
    catch(e){showToast('Erro ao excluir','error');}
  }

  // Check ops
  async function toggleCheck(day,section,idx){
    const newVal=!(((checkState[day]||{})[section]||{})[idx]);
    setCheckState(cs=>({...cs,[day]:{...(cs[day]||{}),[section]:{...((cs[day]||{})[section]||{}),[idx]:newVal}}}));
    try{await sb.upsert('checklist_state',{id:`${day}_${section}_${idx}`,data:day,secao:section,indice:idx,concluido:newVal});}
    catch(e){}
  }
  async function setStars(day,n){
    setCheckState(cs=>({...cs,[day]:{...(cs[day]||{}),_stars:n}}));
    try{await sb.upsert('checklist_state',{id:`${day}_stars_0`,data:day,secao:'stars',indice:0,concluido:n>3});}
    catch(e){}
    showToast(`Produtividade: ${n}/5 ⭐`,'success');
  }

  function addCheck(section){
    const text=prompt('Nome do item:');if(!text?.trim())return;
    const updated={...checks,[section]:[...(checks[section]||[]),text.trim()]};
    localStorage.setItem('nac_checks',JSON.stringify(updated));
    showToast('Item adicionado!','success');
  }

  // Log ops
  async function saveLog(day,{tipo,texto}){
    const hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const item={id:uid(),data:day,tipo,texto,hora};
    try{
      await sb.post('logs',item);
      setLogs(l=>({...l,[day]:[...(l[day]||[]),item]}));
      showToast('Registrado!','success');
    }catch(e){showToast('Erro ao registrar','error');}
  }

  // Briefing
  async function handleBriefing(clear=false){
    if(clear){setBriefing('');return;}
    setBriefingLoading(true);setBriefing('');
    const today=todayStr();
    const tj=tasks.filter(t=>t.data===today);
    const at=tasks.filter(t=>t.data&&t.data<today&&t.status!=='Concluído');
    const ma=melhorias.filter(m=>m.status!=='Concluído');
    const context=`DATA: ${fmtDateLong(today)}\nTAREFAS HOJE: ${tj.map(t=>`[${t.status}] ${t.titulo}`).join(', ')||'Nenhuma'}\nATRASADAS: ${at.length}\nMELHORIAS ATIVAS: ${ma.length}`;
    try{
      const r=await fetch(EDGE_FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},body:JSON.stringify({system:`Você é o assistente do NAC. Dados: ${context}`,messages:[{role:'user',content:'Faça um briefing direto do meu dia com prioridades, riscos e recomendações. Use bullets. Máximo 200 palavras.'}]})});
      const d=await r.json();
      setBriefing(d.content?.map(c=>c.text||'').join('')||'Erro ao gerar briefing.');
    }catch(e){setBriefing('Erro ao conectar com a IA.');}
    setBriefingLoading(false);
  }

  const navItems=[
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'rotina',icon:'☀️',label:'Rotina'},
    {id:'semana',icon:'📅',label:'Semana'},
    {id:'ia',icon:'🤖',label:'IA'},
    {id:'melhorias',icon:'💡',label:'Melhorias'},
  ];

  const now=new Date();
  const dateStr=now.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})+' · '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:S.bg}}>
      {/* TOPBAR */}
      <div style={{background:S.surface,borderBottom:`1px solid ${S.border}`,padding:'0 16px',height:52,display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:50,flexShrink:0}}>
        <button onClick={()=>setSideOpen(true)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:S.text2,padding:4,display:'flex',alignItems:'center',WebkitAppearance:'none'}}>☰</button>
        <span style={{fontFamily:'Montserrat,sans-serif',fontSize:15,fontWeight:800,color:S.az}}>NAC</span>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:syncOk?S.green:S.red,flexShrink:0}}/>
          <span style={{fontSize:11,color:S.text3}}>{dateStr}</span>
        </div>
      </div>

      {/* SIDEBAR */}
      {sideOpen&&(
        <div style={{position:'fixed',inset:0,zIndex:100,display:'flex'}}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)'}} onClick={()=>setSideOpen(false)}/>
          <div style={{position:'relative',width:220,background:S.az,height:'100%',display:'flex',flexDirection:'column',zIndex:1}}>
            <div style={{padding:'18px 16px 12px',borderBottom:'1px solid rgba(255,255,255,.1)'}}>
              <div style={{fontFamily:'Montserrat,sans-serif',fontSize:18,fontWeight:800,color:'#fff'}}>NAC</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.45)',fontWeight:500,textTransform:'uppercase',letterSpacing:.8,marginTop:1}}>Centro de Comando</div>
            </div>
            <nav style={{flex:1,padding:'10px 8px',overflowY:'auto'}}>
              {navItems.map(item=>(
                <button key={item.id} onClick={()=>{setTab(item.id);setSideOpen(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 10px',borderRadius:8,color:tab===item.id?'#fff':'rgba(255,255,255,.65)',fontSize:13,fontWeight:tab===item.id?600:500,cursor:'pointer',border:'none',background:tab===item.id?'rgba(255,255,255,.15)':'transparent',width:'100%',textAlign:'left',marginBottom:2,WebkitAppearance:'none'}}>
                  <span style={{fontSize:16,width:20,textAlign:'center'}}>{item.icon}</span>
                  {item.label}
                </button>
              ))}
            </nav>
            <div style={{padding:'12px 8px',borderTop:'1px solid rgba(255,255,255,.1)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px'}}>
                <div style={{width:30,height:30,borderRadius:'50%',background:'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',flexShrink:0}}>N</div>
                <div>
                  <div style={{fontSize:12,color:'rgba(255,255,255,.7)',fontWeight:500}}>NAC · Marista</div>
                  <div style={{fontSize:9,color:'rgba(255,255,255,.4)'}}>{syncing?'Sincronizando...':syncOk?'Sincronizado':'Erro de conexão'}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* CONTENT */}
      <div style={{flex:1,overflowY:'auto',padding:16}}>
        {tab==='dashboard'&&<Dashboard tasks={tasks} melhorias={melhorias} checkState={checkState} checks={checks} onToggleCheck={(s,i)=>toggleCheck(todayStr(),s,i)} onNewTask={date=>setTaskModal({task:null,date})} onOpenTask={t=>setTaskModal({task:t,date:t.data})} onBriefing={handleBriefing} briefing={briefing} briefingLoading={briefingLoading}/>}
        {tab==='rotina'&&<RotinaWeekView tasks={tasks} checkState={checkState} checks={checks} logs={logs} onToggleCheck={toggleCheck} onNewTask={date=>setTaskModal({task:null,date})} onOpenTask={t=>setTaskModal({task:t,date:t.data})} onSaveLog={saveLog} onSetStar={setStars} weekOffset={weekOffset} onChangeWeek={d=>setWeekOffset(d===0?0:weekOffset+d)}/>}
        {tab==='semana'&&<Semana tasks={tasks} weekOffset={weekOffset} onChangeWeek={d=>setWeekOffset(d===0?0:weekOffset+d)} onNewTask={date=>setTaskModal({task:null,date})} onOpenTask={t=>setTaskModal({task:t,date:t.data})}/>}
        {tab==='ia'&&<IAPanel tasks={tasks} melhorias={melhorias} checkState={checkState} checks={checks} logs={logs}/>}
        {tab==='melhorias'&&<Melhorias melhorias={melhorias} onNew={()=>setMelModal({mel:null})} onOpen={m=>setMelModal({mel:m})}/>}
      </div>

      {/* BOTTOM NAV */}
      <div style={{background:S.surface,borderTop:`1px solid ${S.border}`,display:'flex',flexShrink:0,position:'sticky',bottom:0,zIndex:50}}>
        {navItems.map(item=>(
          <button key={item.id} onClick={()=>setTab(item.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'8px 4px',background:'none',border:'none',cursor:'pointer',WebkitAppearance:'none'}}>
            <span style={{fontSize:18}}>{item.icon}</span>
            <span style={{fontSize:9,fontWeight:600,color:tab===item.id?S.az:S.text3,marginTop:2,textTransform:'uppercase',letterSpacing:.3}}>{item.label}</span>
            {tab===item.id&&<div style={{width:20,height:2,background:S.az,borderRadius:2,marginTop:2}}/>}
          </button>
        ))}
      </div>

      {/* MODALS */}
      {taskModal&&<TaskModal task={taskModal.task} defaultDate={taskModal.date} onClose={()=>setTaskModal(null)} onSave={saveTask} onDelete={deleteTask}/>}
      {melModal&&<MelhoriaModal mel={melModal.mel} onClose={()=>setMelModal(null)} onSave={saveMelhoria} onDelete={deleteMelhoria}/>}

      {/* TOAST */}
      <Toast msg={toast.msg} type={toast.type} onHide={()=>setToast({msg:'',type:''})}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
