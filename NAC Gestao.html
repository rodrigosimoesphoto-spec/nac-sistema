<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light">
<title>Gestão NAC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#F0F2F8;font-family:'Inter',sans-serif;color:#111827;font-size:14px;-webkit-text-size-adjust:100%;overflow:hidden}
button{font-family:'Inter',sans-serif;-webkit-appearance:none}
input,select,textarea{font-family:'Inter',sans-serif;-webkit-appearance:none;font-size:16px;color:#111827;background:#fff}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#D4D9ED;border-radius:4px}

/* ── LAYOUT ── */
.shell{display:flex;height:100vh;height:100dvh;overflow:hidden}

/* Sidebar — visible on desktop, hidden on mobile */
.sidebar{width:220px;background:#002B7F;flex-shrink:0;display:flex;flex-direction:column;height:100%;overflow-y:auto}
@media(max-width:768px){.sidebar{display:none}}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #D4D9ED;padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px}

/* Bottom nav — mobile only */
.bottom-nav{background:#fff;border-top:1px solid #D4D9ED;display:none;flex-shrink:0}
@media(max-width:768px){.bottom-nav{display:flex}}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;background:none;border:none;cursor:pointer;gap:1px}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#9CA3AF}
.nav-btn.active .nav-label{color:#002B7F}
.nav-bar{width:20px;height:2px;background:#002B7F;border-radius:2px;margin-top:2px}

/* Mobile menu button */
.menu-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:#4B5563;padding:4px;line-height:1}
@media(max-width:768px){.menu-btn{display:block}}

/* Mobile sidebar overlay */
.sb-ov{position:fixed;inset:0;z-index:100;display:none}
.sb-ov.open{display:flex}
.sb-bg{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.sb-mobile{position:relative;width:220px;background:#002B7F;height:100%;display:flex;flex-direction:column;overflow-y:auto}

/* ── SIDEBAR CONTENT ── */
.sb-brand{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;color:#fff}
.sb-sub{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;margin-bottom:2px;transition:background .1s}
.sb-btn:hover{background:rgba(255,255,255,.08)}
.sb-btn.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.sb-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}

/* ── CARDS ── */
.card{background:#fff;border:1px solid #D4D9ED;border-radius:12px;overflow:hidden;margin-bottom:14px}
.card:last-child{margin-bottom:0}
.card-head{padding:12px 16px;border-bottom:1px solid #E8EBF5;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:13px;font-weight:700;color:#111827}
.card-body{padding:16px}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid #D4D9ED;border-radius:12px;padding:14px 16px}
.kpi.accent{background:#002B7F;border-color:#002B7F}
.kpi.kred{border-left:3px solid #D62828}.kpi.kred .kpi-n{color:#D62828}
.kpi.kgreen{border-left:3px solid #1A7A4A}.kpi.kgreen .kpi-n{color:#1A7A4A}
.kpi.kamber{border-left:3px solid #B86000}.kpi.kamber .kpi-n{color:#B86000}
.kpi-n{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:800;line-height:1;color:#002B7F}
.kpi.accent .kpi-n{color:#fff}
.kpi-l{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px;margin-top:3px}
.kpi.accent .kpi-l{color:rgba(255,255,255,.55)}
.kpi-t{font-size:11px;color:#9CA3AF;margin-top:2px}
.kpi.accent .kpi-t{color:rgba(255,255,255,.6)}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap}
.b-gray{background:#F7F8FC;color:#9CA3AF}
.b-blue{background:#E8EDF8;color:#002B7F}
.b-red{background:#FDEAEA;color:#D62828}
.b-green{background:#E3F5EC;color:#1A7A4A}
.b-amber{background:#FEF3E2;color:#B86000}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;background:#002B7F;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .1s}
.btn:hover{background:#001F5C}
.btn.ghost{background:transparent;border:1.5px solid #D4D9ED;color:#4B5563}
.btn.ghost:hover{border-color:#002B7F;color:#002B7F}
.btn.sm{padding:6px 12px;font-size:11px}
.btn.danger{background:#FDEAEA;color:#D62828;border:none}
.btn.success{background:#E3F5EC;color:#1A7A4A;border:none}

/* ── TASK ITEM ── */
.task-item{background:#fff;border:1px solid #D4D9ED;border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:8px;transition:border-color .1s}
.task-item:hover{border-color:#002B7F}
.task-item:last-child{margin-bottom:0}
.task-item.done{opacity:.55}
.task-title{font-size:13px;font-weight:600;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-meta{font-size:10px;color:#9CA3AF;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* ── CHECK ITEMS ── */
.chk-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #E8EBF5;cursor:pointer;user-select:none;-webkit-user-select:none}
.chk-item:last-child{border-bottom:none}
.chk-box{width:18px;height:18px;border-radius:4px;border:2px solid #D4D9ED;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chk-box.blue{background:#002B7F;border-color:#002B7F}
.chk-box.green{background:#1A7A4A;border-color:#1A7A4A}
.chk-lbl{font-size:13px;color:#111827;flex:1;line-height:1.3}
.chk-lbl.done{text-decoration:line-through;color:#9CA3AF}
.progress{height:5px;background:#E8EBF5;border-radius:3px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}

/* ── LOG ── */
.log-item{padding:10px 12px;background:#F7F8FC;border-radius:8px;margin-bottom:8px}

/* ── WEEK VIEW ── */
.week-grid{display:grid;gap:12px;margin-bottom:14px}
@media(max-width:768px){.week-grid{grid-template-columns:1fr !important}}
.week-col{background:#fff;border:1px solid #D4D9ED;border-radius:12px;overflow:hidden}
.week-col.today{border:2px solid #002B7F;box-shadow:0 4px 16px rgba(0,43,127,.12)}
.week-col-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.week-col.today .week-col-head{background:#002B7F}
.week-col:not(.today) .week-col-head{background:#F7F8FC;border-bottom:1px solid #E8EBF5}
.week-day-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800}
.week-col.today .week-day-name{color:#fff}
.week-col:not(.today) .week-day-name{color:#111827}
.week-day-date{font-size:11px;font-weight:500}
.week-col.today .week-day-date{color:rgba(255,255,255,.7)}
.week-col:not(.today) .week-day-date{color:#9CA3AF}
.week-body{padding:12px 16px}
.week-task{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#F7F8FC;border:1px solid #E8EBF5;border-radius:8px;cursor:pointer;margin-bottom:8px;transition:border-color .1s}
.week-task:last-child{margin-bottom:0}
.week-task:hover{border-color:#002B7F}
.week-col.today .week-task{background:#E8EDF8;border-color:#C5D3F0}
.week-add{display:flex;align-items:center;gap:6px;padding:8px 10px;color:#9CA3AF;font-size:12px;font-weight:600;cursor:pointer;border-top:1px solid #E8EBF5;transition:color .1s}
.week-add:hover{color:#002B7F}

/* ── ROTINA ITEM ── */
.rotina-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid #D4D9ED;border-radius:8px;margin-bottom:8px;cursor:grab}
.rotina-item:last-child{margin-bottom:0}
.rotina-drag{color:#9CA3AF;font-size:16px;cursor:grab;flex-shrink:0}
.rotina-txt{flex:1;font-size:13px;color:#111827}
.rotina-del{background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:16px;padding:0;line-height:1;flex-shrink:0}
.rotina-del:hover{color:#D62828}

/* ── AI ── */
.ai-msgs{padding:14px;display:flex;flex-direction:column;gap:10px;height:350px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ai-msg{max-width:85%;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.6}
.ai-msg.bot{background:#E8EDF8;align-self:flex-start}
.ai-msg.user{background:#002B7F;color:#fff;align-self:flex-end}
.ai-msg.thinking{background:#F7F8FC;color:#9CA3AF;font-style:italic;align-self:flex-start}
.ai-row{border-top:1px solid #D4D9ED;padding:12px 14px;display:flex;gap:8px;align-items:flex-end}
.ai-inp{flex:1;border:1.5px solid #D4D9ED;border-radius:8px;padding:10px 12px;font-size:14px;color:#111827;background:#fff;outline:none;resize:none;min-height:40px;max-height:100px;font-family:'Inter',sans-serif;line-height:1.4}
.ai-inp:focus{border-color:#002B7F}
.ai-send{background:#002B7F;color:#fff;border:none;border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0}
.ai-send:disabled{opacity:.4}
.qbtn{text-align:left;padding:10px 14px;background:#F7F8FC;border:1px solid #D4D9ED;border-radius:8px;font-size:13px;color:#111827;cursor:pointer;font-family:'Inter',sans-serif;width:100%;display:block;margin-bottom:8px;transition:border-color .1s}
.qbtn:hover{border-color:#002B7F}

/* ── SECTION TITLE ── */
.sec-title{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:800;color:#111827;margin-bottom:14px}
.sec-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;flex-wrap:wrap}

/* ── EMPTY ── */
.empty{text-align:center;padding:28px 16px;color:#9CA3AF;font-size:12px}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
@media(max-width:600px){.modal-ov{align-items:flex-end;padding:0}}
.modal-ov.open{display:flex}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
@media(max-width:600px){.modal-box{border-radius:16px 16px 0 0;max-height:92vh}}
.modal-head{background:#002B7F;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;border-radius:14px 14px 0 0}
@media(max-width:600px){.modal-head{border-radius:16px 16px 0 0}}
.modal-title-el{color:#fff;font-size:14px;font-weight:700}
.modal-close-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.modal-form{padding:16px;display:flex;flex-direction:column;gap:12px;flex:1}
.modal-foot{padding:12px 16px;border-top:1px solid #D4D9ED;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}

/* ── FORM ELEMENTS ── */
.fg{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:10px;font-weight:700;color:#4B5563;text-transform:uppercase;letter-spacing:.5px}
.finp,.fsel,.ftxt{width:100%;padding:10px 12px;border:1.5px solid #D4D9ED;border-radius:8px;font-size:14px;color:#111827;background:#fff;outline:none;transition:border-color .1s}
@media(max-width:600px){.finp,.fsel,.ftxt{font-size:16px}}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:#002B7F}
.ftxt{resize:vertical;min-height:80px;line-height:1.5;font-family:'Inter',sans-serif}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:500px){.frow,.frow3{grid-template-columns:1fr}}

/* ── TOAST ── */
.toast-el{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;z-index:500;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;pointer-events:none}
@media(min-width:769px){.toast-el{bottom:20px}}
</style>
</head>
<body>
<div class="shell" id="app-root"></div>

<!-- PERSISTENT MODAL -->
<div class="modal-ov" id="the-modal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title-el" id="modal-title-el">Novo</span>
      <button class="modal-close-btn" id="modal-close-btn">×</button>
    </div>
    <div class="modal-form" id="modal-form"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-el" id="the-toast"></div>

<script>
// ═══════════════════════════
// CONFIG
// ═══════════════════════════
const SB='https://syuqwuqkbkqpysugltky.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dXF3dXFrYmtxcHlzdWdsdGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNTc5MDUsImV4cCI6MjA5OTYzMzkwNX0.gh_wA901Mos_8Sot_hSf9Uu1zm_1IQSzcnJVPFLskrM';
const EDGE='https://syuqwuqkbkqpysugltky.supabase.co/functions/v1/nac-ia';
const SBH={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

const db={
  async get(t,p=''){const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:SBH});if(!r.ok)throw new Error();return r.json();},
  async post(t,d){const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:SBH,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async patch(t,id,d){const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:SBH,body:JSON.stringify(d)});if(!r.ok)throw new Error();return r.json();},
  async del(t,id){const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:SBH});if(!r.ok)throw new Error();},
  async ups(t,d){const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:{...SBH,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error();return r.json();}
};

// ═══════════════════════════
// STATE
// ═══════════════════════════
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DAYS_FULL=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const DEFAULT_CHECKS={
  abertura:['Conferir e-mails','Conferir Teams','Conferir WhatsApp','Conferir agenda do dia','Verificar ocorrências','Conferir atividades NAC','Verificar pagamentos','Verificar matrículas','Conferir professores e instrutores','Conferir materiais'],
  encerramento:['Atividades concluídas registradas','Pendências documentadas','Demandas para amanhã anotadas','Registros do dia salvos','Setor organizado e fechado']
};

let tasks=[], mels=[], checkState={}, logs=[];
let checks=JSON.parse(localStorage.getItem('nac_chk_v2')||JSON.stringify(DEFAULT_CHECKS));
let tab='dashboard', wkOff=0, rtOff=0, syncOk=true;
let iaHist=[{r:'bot',t:'Olá! Sou o assistente do NAC. Estou conectado ao banco em tempo real. O que precisa?'}];
let iaBusy=false;
let briefing='', briefingLoading=false;

// ═══════════════════════════
// UTILS
// ═══════════════════════════
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;};
const fmtDL=s=>{if(!s)return'';return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});};
const fmtDT=()=>{const n=new Date();return n.toLocaleDateString('pt-BR')+' '+n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const pdot=p=>({'Alta':'#D62828','Média':'#B86000','Baixa':'#1A7A4A'}[p]||'#9CA3AF');
const bcls=s=>({'Não iniciado':'b-gray','Em andamento':'b-blue','Aguardando':'b-amber','Concluído':'b-green','Alta':'b-red','Média':'b-amber','Baixa':'b-green','Identificado':'b-gray','Em análise':'b-blue','Em execução':'b-amber','Descartado':'b-gray'}[s]||'b-gray');

function saveChecks(){localStorage.setItem('nac_chk_v2',JSON.stringify(checks));}

function wkDates(off=0){
  const n=new Date(),day=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-day+1+off*7);
  return[0,1,2,3,4].map(i=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});
}

// ═══════════════════════════
// TOAST
// ═══════════════════════════
let toastT=null;
function toast(msg,type=''){
  const el=document.getElementById('the-toast');
  if(!el)return;
  el.textContent=msg;
  el.style.background=type==='ok'?'#1A7A4A':type==='err'?'#D62828':'#002B7F';
  el.style.color='#fff';
  el.style.display='block';
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>el.style.display='none',2500);
}

// ═══════════════════════════
// MODAL — DOM never rebuilt
// ═══════════════════════════
let mType=null, mData=null;

function modalOpen(type,data){
  mType=type; mData=data;
  const titleEl=document.getElementById('modal-title-el');
  const formEl=document.getElementById('modal-form');
  const footEl=document.getElementById('modal-foot');
  formEl.innerHTML=''; footEl.innerHTML='';

  if(type==='task'){
    const t=data.task||{};
    titleEl.textContent=t.id?'Editar Tarefa':'Nova Tarefa';
    // Fields
    formEl.appendChild(fg('Título',inp('pm-t','pm-t',t.titulo||'','O que precisa ser feito?')));
    formEl.appendChild(fg('Descrição',txt('pm-d',t.descricao||'')));
    const r1=row(); r1.appendChild(fg('Data',inp('pm-data','pm-data',t.data||data.date||'',' ','date'))); r1.appendChild(fg('Horário',inp('pm-hr','pm-hr',t.hora||'','','time'))); formEl.appendChild(r1);
    const r2=row(); r2.appendChild(fg('Responsável',sel('pm-resp',['Coordenador','Assistente','Ambos'],t.responsavel||'Coordenador'))); r2.appendChild(fg('Destinatário',inp('pm-dest','pm-dest',t.destinatario||'','Para quem é?'))); formEl.appendChild(r2);
    const r3=row(); r3.appendChild(fg('Prioridade',sel('pm-prio',['Alta','Média','Baixa'],t.prioridade||'Média'))); r3.appendChild(fg('Status',sel('pm-status',['Não iniciado','Em andamento','Aguardando','Concluído'],t.status||'Não iniciado'))); formEl.appendChild(r3);
    formEl.appendChild(fg('Categoria',inp('pm-cat','pm-cat',t.categoria||'','Ex: Administrativo')));
    formEl.appendChild(fg('Observações',txt('pm-obs',t.observacoes||'')));
    if(t.status==='Concluído'||t.concluido_por){
      const r4=row3();
      r4.appendChild(fg('Concluído por',inp('pm-cby','pm-cby',t.concluido_por||'','')));
      r4.appendChild(fg('Data conclusão',inp('pm-cdt','pm-cdt',t.concluido_em?t.concluido_em.slice(0,10):'','','date')));
      r4.appendChild(fg('Hora conclusão',inp('pm-chr','pm-chr',t.concluido_em?t.concluido_em.slice(11,16):'','','time')));
      formEl.appendChild(r4);
    }
    // Footer
    const sb=mkBtn('Salvar','#002B7F','#fff'); sb.onclick=submitTask; footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true));
    if(t.id){const db2=mkBtn('Excluir','#FDEAEA','#D62828');db2.onclick=()=>doDelTask(t.id);footEl.appendChild(db2);}
    footEl.appendChild(sb);
  }

  else if(type==='mel'){
    const m=data.mel||{};
    titleEl.textContent=m.id?'Editar Melhoria':'Nova Melhoria';
    formEl.appendChild(fg('Problema identificado',txt('pm-prob',m.problema||'')));
    formEl.appendChild(fg('Sugestão de melhoria',txt('pm-sug',m.sugestao||'')));
    const r1=row(); r1.appendChild(fg('Prioridade',sel('pm-prio',['Alta','Média','Baixa'],m.prioridade||'Média'))); r1.appendChild(fg('Impacto',sel('pm-imp',['Alto','Médio','Baixo'],m.impacto||'Médio'))); formEl.appendChild(r1);
    const r2=row(); r2.appendChild(fg('Responsável',sel('pm-resp',['Coordenador','Assistente','Equipe'],m.responsavel||'Coordenador'))); r2.appendChild(fg('Setor encaminhado',inp('pm-setor','pm-setor',m.setor||'','Ex: Manutenção, TI...'))); formEl.appendChild(r2);
    const r3=row(); r3.appendChild(fg('Prazo',inp('pm-prazo','pm-prazo',m.prazo||'','','date'))); r3.appendChild(fg('Status',sel('pm-status',['Identificado','Em análise','Em execução','Concluído','Descartado'],m.status||'Identificado'))); formEl.appendChild(r3);
    const sb=mkBtn('Salvar','#002B7F','#fff'); sb.onclick=submitMel; footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true));
    if(m.id){const db2=mkBtn('Excluir','#FDEAEA','#D62828');db2.onclick=()=>doDelMel(m.id);footEl.appendChild(db2);}
    footEl.appendChild(sb);
  }

  else if(type==='log'){
    titleEl.textContent=`Registrar — ${fmtD(data.day)}`;
    formEl.appendChild(fg('Tipo',sel('pm-log-tipo',['ocorrencia','decisao','reuniao','ideia','observacao'],'ocorrencia')));
    formEl.appendChild(fg('Descrição',txt('pm-log-txt','')));
    const sb=mkBtn('Registrar','#002B7F','#fff'); sb.onclick=()=>submitLog(data.day);
    footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true)); footEl.appendChild(sb);
  }

  else if(type==='addchk'){
    titleEl.textContent=`Adicionar item — ${data.sec==='abertura'?'Abertura':'Encerramento'}`;
    formEl.appendChild(fg('Nome do item',inp('pm-chk-txt','pm-chk-txt','','Ex: Verificar escala...')));
    const sb=mkBtn('Adicionar','#002B7F','#fff'); sb.onclick=()=>submitChk(data.sec);
    footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true)); footEl.appendChild(sb);
  }

  document.getElementById('the-modal').classList.add('open');
  setTimeout(()=>{const f=formEl.querySelector('input,textarea');if(f&&type!=='log')f.focus();},150);
}

function modalClose(){
  document.getElementById('the-modal').classList.remove('open');
  mType=null; mData=null;
}

// DOM builders — no innerHTML on inputs
function fg(label,input){const d=document.createElement('div');d.className='fg';const l=document.createElement('label');l.className='flbl';l.textContent=label;d.appendChild(l);d.appendChild(input);return d;}
function row(){const d=document.createElement('div');d.className='frow';return d;}
function row3(){const d=document.createElement('div');d.className='frow3';return d;}
function inp(id,name,val,ph='',type='text'){const el=document.createElement('input');el.className='finp';el.id=id;el.name=name;el.type=type;el.value=val;el.placeholder=ph;return el;}
function sel(id,opts,val){const el=document.createElement('select');el.className='fsel';el.id=id;opts.forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;if(o===val)op.selected=true;el.appendChild(op);});return el;}
function txt(id,val,ph=''){const el=document.createElement('textarea');el.className='ftxt';el.id=id;el.value=val;el.placeholder=ph;el.rows=3;return el;}
function mkBtn(label,bg,color,isCancel=false){const el=document.createElement('button');el.className='btn';el.textContent=label;el.style.background=bg;el.style.color=color;if(bg==='transparent')el.style.border='1.5px solid #D4D9ED';if(isCancel)el.onclick=modalClose;return el;}
function gv(id){return document.getElementById(id)?.value||'';}

// ═══════════════════════════
// SUBMIT HANDLERS
// ═══════════════════════════
async function submitTask(){
  const titulo=gv('pm-t');
  if(!titulo.trim()){toast('Informe o título','err');return;}
  const id=mData?.task?.id;
  const statusVal=gv('pm-status')||'Não iniciado';
  const item={
    id:id||uid(), titulo,
    descricao:gv('pm-d'),
    data:gv('pm-data')||today(),
    hora:gv('pm-hr'),
    responsavel:gv('pm-resp')||'Coordenador',
    destinatario:gv('pm-dest'),
    prioridade:gv('pm-prio')||'Média',
    status:statusVal,
    categoria:gv('pm-cat'),
    observacoes:gv('pm-obs'),
    criado_por: id?mData.task.criado_por:'Coordenador',
    criado_em: id?mData.task.criado_em:new Date().toISOString(),
  };
  // If concluded, record who/when
  if(statusVal==='Concluído'){
    item.concluido_por=gv('pm-cby')||'Coordenador';
    const cdt=gv('pm-cdt'), chr=gv('pm-chr');
    item.concluido_em=cdt?(cdt+'T'+(chr||'00:00')):new Date().toISOString();
  }
  try{
    if(id){await db.patch('tarefas',id,item);}
    else{await db.post('tarefas',item);}
    modalClose();
    await loadAll();
    toast('Tarefa salva!','ok');
  }catch(e){toast('Erro ao salvar','err');}
}

async function doDelTask(id){
  if(!confirm('Excluir esta tarefa?'))return;
  try{await db.del('tarefas',id);modalClose();await loadAll();toast('Excluída.');}
  catch(e){toast('Erro','err');}
}

async function submitMel(){
  const problema=gv('pm-prob');
  if(!problema.trim()){toast('Descreva o problema','err');return;}
  const id=mData?.mel?.id;
  const item={id:id||uid(),problema,sugestao:gv('pm-sug'),prioridade:gv('pm-prio')||'Média',impacto:gv('pm-imp')||'Médio',responsavel:gv('pm-resp')||'Coordenador',setor:gv('pm-setor'),prazo:gv('pm-prazo'),status:gv('pm-status')||'Identificado'};
  try{
    if(id){await db.patch('melhorias',id,item);}
    else{await db.post('melhorias',item);}
    modalClose();await loadAll();toast('Melhoria salva!','ok');
  }catch(e){toast('Erro','err');}
}

async function doDelMel(id){
  if(!confirm('Excluir?'))return;
  try{await db.del('melhorias',id);modalClose();await loadAll();toast('Excluída.');}
  catch(e){toast('Erro','err');}
}

async function submitLog(day){
  const tipo=gv('pm-log-tipo')||'ocorrencia';
  const texto=gv('pm-log-txt');
  if(!texto.trim()){toast('Descreva o registro','err');return;}
  const hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const item={id:uid(),data:day,tipo,texto,hora};
  try{
    await db.post('logs',item);
    modalClose();await loadAll();toast('Registrado!','ok');
  }catch(e){toast('Erro','err');}
}

function submitChk(sec){
  const txt=gv('pm-chk-txt');
  if(!txt.trim()){toast('Digite o nome do item','err');return;}
  checks[sec]=[...(checks[sec]||[]),txt.trim()];
  saveChecks();modalClose();render();toast('Item adicionado!','ok');
}

// ═══════════════════════════
// CHECKLIST OPS
// ═══════════════════════════
async function toggleCheck(day,sec,idx){
  if(!checkState[day])checkState[day]={};
  if(!checkState[day][sec])checkState[day][sec]={};
  const newVal=!checkState[day][sec][idx];
  checkState[day][sec][idx]=newVal;
  render();
  try{await db.ups('checklist_state',{id:`${day}_${sec}_${idx}`,data:day,secao:sec,indice:idx,concluido:newVal});}catch(e){}
}

async function setStars(day,n){
  if(!checkState[day])checkState[day]={};
  checkState[day]._stars=n;
  render();
  try{await db.ups('checklist_state',{id:`${day}_stars_0`,data:day,secao:'stars',indice:n,concluido:true});}catch(e){}
  toast(`Produtividade: ${n}/5 ⭐`,'ok');
}

function removeChkItem(sec,idx){
  if(!confirm('Remover este item?'))return;
  checks[sec].splice(idx,1);
  saveChecks();render();
}

function moveChkItem(sec,idx,dir){
  const arr=checks[sec];
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=arr.length)return;
  [arr[idx],arr[newIdx]]=[arr[newIdx],arr[idx]];
  saveChecks();render();
}

// ═══════════════════════════
// DATA LOAD
// ═══════════════════════════
async function loadAll(){
  try{
    const[t,m,c,l]=await Promise.all([
      db.get('tarefas','order=criado_em.desc'),
      db.get('melhorias','order=criado_em.desc'),
      db.get('checklist_state'),
      db.get('logs','order=criado_em.desc&limit=200')
    ]);
    tasks=t||[]; mels=m||[]; logs=l||[];
    checkState={};
    (c||[]).forEach(r=>{
      if(!checkState[r.data])checkState[r.data]={};
      if(r.secao==='stars')checkState[r.data]._stars=r.indice;
      else{if(!checkState[r.data][r.secao])checkState[r.data][r.secao]={};checkState[r.data][r.secao][r.indice]=r.concluido;}
    });
    syncOk=true;
    if(!document.getElementById('the-modal').classList.contains('open'))render();
  }catch(e){syncOk=false;}
}

function buildCtx(){
  const td=today();
  const tj=tasks.filter(t=>t.data===td);
  const at=tasks.filter(t=>t.data&&t.data<td&&t.status!=='Concluído');
  const lh=logs.filter(l=>l.data===td);
  const ab=checks.abertura||[];
  const abD=ab.filter((_,i)=>((checkState[td]||{}).abertura||{})[i]).length;
  const ma=mels.filter(m=>m.status!=='Concluído'&&m.status!=='Descartado');
  return`DATA:${fmtDL(td)}\nTAREFAS HOJE(${tj.length}):${tj.map(t=>`[${t.status}]${t.titulo}|${t.responsavel}`).join('/')||'Nenhuma'}\nATRASADAS(${at.length}):${at.map(t=>`${fmtD(t.data)} ${t.titulo}`).join('/')||'Nenhuma'}\nCHECKLIST:${abD}/${ab.length}\nLOGS(${lh.length}):${lh.map(l=>`[${l.tipo}]${l.texto.slice(0,40)}`).join('/')||'Nenhum'}\nMELHORIAS(${ma.length}):${ma.slice(0,4).map(m=>`[${m.prioridade}]${(m.problema||'').slice(0,40)}`).join('/')||'Nenhuma'}`;
}

async function sendIA(msg){
  if(!msg||!msg.trim()||iaBusy)return;
  iaBusy=true;
  const userMsg=msg.trim();
  iaHist.push({r:'user',t:userMsg});
  // Clear input
  const inp=document.getElementById('ai-inp-el');
  if(inp){inp.value='';inp.style.height='auto';}
  renderIA();
  try{
    const messages=iaHist.slice(-8).map(m=>({role:m.r==='user'?'user':'assistant',content:m.t}));
    const r=await fetch(EDGE,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({system:'Você é o assistente do NAC Marista. Português direto, sem formalidade.

'+buildCtx(),messages})}));
    const d=await r.json();
    iaHist.push({r:'bot',t:d.content?.map(c=>c.text||'').join('')||'Erro.'});
  }catch(e){iaHist.push({r:'bot',t:'Erro ao conectar.'});}
  iaBusy=false; renderIA();
}

function renderIA(){
  const el=document.getElementById('ia-msgs-el');
  if(!el){
    // IA panel not visible — re-render full page if on ia tab
    if(tab==='ia') render();
    return;
  }
  el.innerHTML=iaHist.map(m=>`<div class="ai-msg ${m.r==='user'?'user':'bot'}">${esc(m.t).replace(/\n/g,'<br>')}</div>`).join('')+(iaBusy?'<div class="ai-msg thinking">Analisando...</div>':'');
  el.scrollTop=el.scrollHeight;
  // Update send button state
  const btn=document.querySelector('.ai-send');
  if(btn) btn.disabled=iaBusy;
}

async function genBriefing(){
  briefingLoading=true;briefing='';render();
  try{
    const r=await fetch(EDGE,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({system:'Assistente NAC Marista. Dados:\n'+buildCtx(),messages:[{role:'user',content:'Briefing direto: prioridades, riscos, recomendações. Bullets. Máx 200 palavras.'}]})});
    const d=await r.json();
    briefing=d.content?.map(c=>c.text||'').join('')||'Erro.';
  }catch(e){briefing='Erro ao conectar.';}
  briefingLoading=false;render();
}

function taskH(t,showDate=false){
  const pc=pdot(t.prioridade);
  return`<div class="task-item${t.status==='Concluído'?' done':''}" onclick="modalOpen('task',{task:tasks.find(x=>x.id==='${t.id}')})">
    <div class="pdot" style="background:${pc}"></div>
    <div style="flex:1;min-width:0">
      <div class="task-title">${esc(t.titulo)}</div>
      <div class="task-meta">
        ${showDate?`<span>📅 ${fmtD(t.data)}</span>`:''}
        ${t.hora?`<span>🕐 ${t.hora}</span>`:''}
        <span>👤 ${esc(t.responsavel||'')}</span>
        ${t.destinatario?`<span>→ ${esc(t.destinatario)}</span>`:''}
        <span class="badge ${bcls(t.status)}">${esc(t.status)}</span>
        ${t.status==='Concluído'&&t.concluido_por?`<span>✅ ${esc(t.concluido_por)}</span>`:''}
      </div>
    </div>
  </div>`;
}

function chkH(day,sec,color){
  const items=checks[sec]||[];
  const st=(checkState[day]||{})[sec]||{};
  const done=items.filter((_,i)=>st[i]).length;
  const pct=items.length?Math.round(done/items.length*100):0;
  const rows=items.map((item,i)=>`
    <div class="chk-item" onclick="toggleCheck('${day}','${sec}',${i})">
      <div class="chk-box${st[i]?' '+color:''}">${st[i]?'<span style="color:#fff;font-size:10px;font-weight:700">✓</span>':''}</div>
      <span class="chk-lbl${st[i]?' done':''}">${esc(item)}</span>
      <div style="display:flex;gap:4px;flex-shrink:0" onclick="event.stopPropagation()">
        ${i>0?`<button onclick="moveChkItem('${sec}',${i},-1)" style="background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:14px;padding:0;line-height:1">↑</button>`:''}
        ${i<items.length-1?`<button onclick="moveChkItem('${sec}',${i},1)" style="background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:14px;padding:0;line-height:1">↓</button>`:''}
        <button onclick="removeChkItem('${sec}',${i})" style="background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:16px;padding:0;line-height:1">×</button>
      </div>
    </div>`).join('');
  return rows+`<div class="progress"><div class="prog-fill" style="width:${pct}%;background:${color==='green'?'#1A7A4A':'#002B7F'}"></div></div><div style="font-size:10px;color:#9CA3AF;text-align:right;margin-top:4px">${done}/${items.length} concluídos</div>`;
}

function rotinaHTML(){

function addSugestao(txt){
  const sec=prompt(`Adicionar "${txt}" em qual lista?\n1 = Abertura\n2 = Encerramento`,'1');
  if(sec==='1'){checks.abertura=[...(checks.abertura||[]),txt];}
  else if(sec==='2'){checks.encerramento=[...(checks.encerramento||[]),txt];}
  else return;
  saveChecks();render();toast('Adicionado!','ok');
}

        <span style="font-family:'Montserrat',sans-serif;font-size:15px;font-weight:800;color:#002B7F">${NAV.find(n=>n.id===tab)?.icon} ${NAV.find(n=>n.id===tab)?.label||'NAC'}</span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
          <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:${syncOk?'#1A7A4A':'#D62828'}"></div><span style="font-size:11px;color:#9CA3AF">${dt}</span></div>
        </div>
      </div>
      <div class="content" id="main-content">${panel}</div>
      <div class="bottom-nav">
        ${NAV.map(n=>`<button class="nav-btn${tab===n.id?' active':''}" onclick="tab='${n.id}';render()"><span class="nav-icon">${n.icon}</span><span class="nav-label">${n.label}</span>${tab===n.id?'<div class="nav-bar"></div>':''}</button>`).join('')}
      </div>
    </div>
    <!-- Mobile sidebar overlay -->
    <div class="sb-ov" id="sb-ov">
      <div class="sb-bg" onclick="document.getElementById('sb-ov').classList.remove('open')"></div>
      <div class="sb-mobile">${sbContent}</div>
    </div>`;

  if(tab==='ia'){const el=document.getElementById('ia-msgs-el');if(el)el.scrollTop=el.scrollHeight;}
}

// ═══════════════════════════
// INIT
// ═══════════════════════════
document.getElementById('modal-close-btn').onclick=modalClose;
document.getElementById('the-modal').onclick=function(e){if(e.target===this)modalClose();};

render();
loadAll();
setInterval(()=>{if(!document.getElementById('the-modal').classList.contains('open'))loadAll();},30000);
</script>
</body>
</html>
