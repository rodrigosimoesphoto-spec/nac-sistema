<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light">
<title>Gestão NAC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#F0F2F8;font-family:'Inter',sans-serif;color:#111827;font-size:14px;-webkit-text-size-adjust:100%;overflow:hidden}
button{font-family:'Inter',sans-serif;-webkit-appearance:none}
input,select,textarea{font-family:'Inter',sans-serif;-webkit-appearance:none;font-size:16px;color:#111827}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#D4D9ED;border-radius:4px}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{background:#fff;border-bottom:1px solid #D4D9ED;padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:flex;flex-direction:column;gap:14px}
.bottom-nav{background:#fff;border-top:1px solid #D4D9ED;display:flex;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;background:none;border:none;cursor:pointer;gap:1px}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#9CA3AF}
.nav-btn.active .nav-label{color:#002B7F}
.nav-bar{width:20px;height:2px;background:#002B7F;border-radius:2px;margin-top:2px}

/* SIDEBAR */
.sb-ov{position:fixed;inset:0;z-index:100;display:none}
.sb-ov.open{display:flex}
.sb-bg{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.sb{position:relative;width:220px;background:#002B7F;height:100%;display:flex;flex-direction:column;overflow-y:auto}
.sb-brand{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;color:#fff}
.sb-sub{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.8px}
.sb-nav{flex:1;padding:10px 8px}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;margin-bottom:2px}
.sb-btn.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.sb-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}

/* CARDS */
.card{background:#fff;border:1px solid #D4D9ED;border-radius:12px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid #E8EBF5;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:13px;font-weight:700;color:#111827}
.card-body{padding:16px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:#fff;border:1px solid #D4D9ED;border-radius:12px;padding:14px 16px}
.kpi.accent{background:#002B7F;border-color:#002B7F}
.kpi.kred{border-left:3px solid #D62828}
.kpi.kgreen{border-left:3px solid #1A7A4A}
.kpi.kamber{border-left:3px solid #B86000}
.kpi-n{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:800;line-height:1;color:#002B7F}
.kpi.accent .kpi-n{color:#fff}
.kpi.kred .kpi-n{color:#D62828}
.kpi.kgreen .kpi-n{color:#1A7A4A}
.kpi.kamber .kpi-n{color:#B86000}
.kpi-l{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px;margin-top:3px}
.kpi.accent .kpi-l{color:rgba(255,255,255,.55)}
.kpi-t{font-size:11px;color:#9CA3AF;margin-top:2px}
.kpi.accent .kpi-t{color:rgba(255,255,255,.6)}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;text-transform:uppercase;white-space:nowrap}
.b-gray{background:#F7F8FC;color:#9CA3AF}
.b-blue{background:#E8EDF8;color:#002B7F}
.b-red{background:#FDEAEA;color:#D62828}
.b-green{background:#E3F5EC;color:#1A7A4A}
.b-amber{background:#FEF3E2;color:#B86000}

/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;background:#002B7F;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn.ghost{background:transparent;border:1.5px solid #D4D9ED;color:#4B5563}
.btn.sm{padding:6px 12px;font-size:11px}
.btn.danger{background:#FDEAEA;color:#D62828}

/* TASK ITEM */
.task-item{background:#fff;border:1px solid #D4D9ED;border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:8px}
.task-item:last-child{margin-bottom:0}
.task-item.done{opacity:.55}
.task-title{font-size:13px;font-weight:600;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-meta{font-size:10px;color:#9CA3AF;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* CHECK */
.chk-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #E8EBF5;cursor:pointer;user-select:none;-webkit-user-select:none}
.chk-item:last-child{border-bottom:none}
.chk-box{width:18px;height:18px;border-radius:4px;border:2px solid #D4D9ED;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.chk-box.blue{background:#002B7F;border-color:#002B7F}
.chk-box.green{background:#1A7A4A;border-color:#1A7A4A}
.chk-lbl{font-size:13px;color:#111827;flex:1;line-height:1.3}
.chk-lbl.done{text-decoration:line-through;color:#9CA3AF}
.progress{height:5px;background:#E8EBF5;border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}

/* LOG */
.log-item{padding:9px 11px;background:#F7F8FC;border-radius:8px;border-left:3px solid #D4D9ED;margin-bottom:8px}

/* WEEK */
.week-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.week-cols{display:flex;gap:10px}
.week-col{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.wcol-head{border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.wcol-sec{background:#fff;border:1px solid #D4D9ED;border-radius:10px;overflow:hidden}
.wcol-sec-head{padding:8px 12px;border-bottom:1px solid #E8EBF5;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:#111827}
.wcol-sec-body{padding:8px 12px}
.wm-task{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid #E8EBF5;cursor:pointer}
.wm-task:last-child{border-bottom:none}
.wm-log{padding:6px 8px;background:#F7F8FC;border-radius:6px;margin-bottom:5px}

/* STARS */
.star{font-size:22px;background:none;border:none;cursor:pointer;padding:0;line-height:1}

/* AI */
.ai-msgs{padding:14px;display:flex;flex-direction:column;gap:10px;min-height:260px;max-height:360px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ai-msg{max-width:88%;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.55}
.ai-msg.bot{background:#E8EDF8;align-self:flex-start}
.ai-msg.user{background:#002B7F;color:#fff;align-self:flex-end}
.ai-msg.thinking{background:#F7F8FC;color:#9CA3AF;font-style:italic;align-self:flex-start}
.ai-row{border-top:1px solid #D4D9ED;padding:10px 12px;display:flex;gap:8px;align-items:flex-end}
.ai-inp{flex:1;border:1.5px solid #D4D9ED;border-radius:8px;padding:9px 11px;font-size:16px;color:#111827;background:#fff;outline:none;resize:none;min-height:38px;max-height:100px;font-family:'Inter',sans-serif;line-height:1.4}
.ai-inp:focus{border-color:#002B7F}
.ai-send{background:#002B7F;color:#fff;border:none;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0}
.ai-send:disabled{opacity:.4}
.qbtn{text-align:left;padding:10px 14px;background:#F7F8FC;border:1px solid #D4D9ED;border-radius:8px;font-size:13px;color:#111827;cursor:pointer;font-family:'Inter',sans-serif;width:100%;display:block;margin-bottom:8px}

/* EMPTY */
.empty{text-align:center;padding:24px 16px;color:#9CA3AF;font-size:12px}

/* MODAL — permanent in DOM, shown/hidden via class */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
.modal-head{background:#002B7F;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;border-radius:16px 16px 0 0}
.modal-title-el{color:#fff;font-size:14px;font-weight:700}
.modal-close-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.modal-form{padding:16px;display:flex;flex-direction:column;gap:12px;flex:1}
.modal-foot{padding:12px 16px;border-top:1px solid #D4D9ED;display:flex;gap:8px;justify-content:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:10px;font-weight:700;color:#4B5563;text-transform:uppercase;letter-spacing:.5px}
.finp,.fsel,.ftxt{width:100%;padding:10px 12px;border:1.5px solid #D4D9ED;border-radius:8px;font-size:16px;color:#111827;background:#fff;outline:none}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:#002B7F}
.ftxt{resize:vertical;min-height:80px;line-height:1.5;font-family:'Inter',sans-serif}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TOAST */
.toast-el{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;z-index:500;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;pointer-events:none}
</style>
</head>
<body>
<div class="app" id="app-root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#002B7F">Carregando...</div>
</div>

<!-- MODAL: Created once, never destroyed -->
<div class="modal-ov" id="the-modal">
  <div class="modal-box" id="modal-box">
    <div class="modal-head">
      <span class="modal-title-el" id="modal-title-el">Novo</span>
      <button class="modal-close-btn" id="modal-close-btn">×</button>
    </div>
    <div class="modal-form" id="modal-form-content"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<!-- TOAST: Created once -->
<div class="toast-el" id="the-toast"></div>

<script>
// ═══════════════════════════
// CONFIG
// ═══════════════════════════
const SB='https://syuqwuqkbkqpysugltky.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dXF3dXFrYmtxcHlzdWdsdGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNTc5MDUsImV4cCI6MjA5OTYzMzkwNX0.gh_wA901Mos_8Sot_hSf9Uu1zm_1IQSzcnJVPFLskrM';
const EDGE='https://syuqwuqkbkqpysugltky.supabase.co/functions/v1/nac-ia';
const SBH={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

const db={
  async get(t,p=''){const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:SBH});if(!r.ok)throw new Error();return r.json();},
  async post(t,d){const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:SBH,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async patch(t,id,d){const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{...SBH},body:JSON.stringify(d)});if(!r.ok)throw new Error();return r.json();},
  async del(t,id){const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:SBH});if(!r.ok)throw new Error();},
  async ups(t,d){const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:{...SBH,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error();return r.json();}
};

// ═══════════════════════════
// STATE
// ═══════════════════════════
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DAYS_FULL=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const CHK={
  abertura:['Conferir e-mails','Conferir Teams','Conferir WhatsApp','Conferir agenda','Verificar ocorrências','Conferir atividades NAC','Verificar pagamentos','Verificar matrículas','Conferir professores','Conferir materiais'],
  encerramento:['Atividades concluídas registradas','Pendências documentadas','Demandas para amanhã','Registros do dia salvos','Setor organizado']
};
let checks=JSON.parse(localStorage.getItem('nac_chk')||JSON.stringify(CHK));

let tasks=[], mels=[], cs={}, logs={};
let tab='dashboard', wkOff=0, rtOff=0, syncOk=true;
let iaHist=[{r:'bot',t:'Olá! Sou o assistente do NAC. Estou conectado ao banco em tempo real. O que precisa?'}];
let iaBusy=false;
let briefing='', briefingLoading=false;

// ═══════════════════════════
// UTILS
// ═══════════════════════════
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;};
const fmtDL=s=>{if(!s)return'';return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const pdot=p=>({'Alta':'#D62828','Média':'#B86000','Baixa':'#1A7A4A'}[p]||'#9CA3AF');
const bcls=s=>({'Não iniciado':'b-gray','Em andamento':'b-blue','Aguardando':'b-amber','Concluído':'b-green','Alta':'b-red','Média':'b-amber','Baixa':'b-green','Identificado':'b-gray','Em análise':'b-blue','Em execução':'b-amber','Descartado':'b-gray'}[s]||'b-gray');

function wkDates(off=0){
  const n=new Date(),day=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-day+1+off*7);
  return[0,1,2,3,4].map(i=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});
}

// ═══════════════════════════
// TOAST
// ═══════════════════════════
let toastTimer=null;
function toast(msg,type=''){
  const el=document.getElementById('the-toast');
  if(!el)return;
  el.textContent=msg;
  el.style.background=type==='ok'?'#1A7A4A':type==='err'?'#D62828':'#002B7F';
  el.style.color='#fff';
  el.style.display='block';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display='none';},2500);
}

// ═══════════════════════════
// MODAL — permanent DOM, just fill content
// ═══════════════════════════
let modalType=null, modalData=null;

function modalOpen(type, data){
  modalType=type; modalData=data;
  const ov=document.getElementById('the-modal');
  const titleEl=document.getElementById('modal-title-el');
  const formEl=document.getElementById('modal-form-content');
  const footEl=document.getElementById('modal-foot');

  // Clear previous content
  formEl.innerHTML='';
  footEl.innerHTML='';

  if(type==='task'){
    const t=data.task||{};
    titleEl.textContent=t.id?'Editar Tarefa':'Nova Tarefa';
    formEl.appendChild(mkFG('Título',mkInp('pm-titulo',t.titulo||'','O que precisa ser feito?')));
    formEl.appendChild(mkFG('Descrição',mkTxt('pm-desc',t.descricao||'')));
    const row1=mkRow();
    row1.appendChild(mkFG('Data',mkInp('pm-data',t.data||data.date||today(),'','date')));
    row1.appendChild(mkFG('Horário',mkInp('pm-hora',t.hora||'','','time')));
    formEl.appendChild(row1);
    const row2=mkRow();
    row2.appendChild(mkFG('Responsável',mkSel('pm-resp',['Coordenador','Assistente','Ambos'],t.responsavel||'Coordenador')));
    row2.appendChild(mkFG('Prioridade',mkSel('pm-prio',['Alta','Média','Baixa'],t.prioridade||'Média')));
    formEl.appendChild(row2);
    const row3=mkRow();
    row3.appendChild(mkFG('Status',mkSel('pm-status',['Não iniciado','Em andamento','Aguardando','Concluído'],t.status||'Não iniciado')));
    row3.appendChild(mkFG('Categoria',mkInp('pm-cat',t.categoria||'','Ex: Administrativo')));
    formEl.appendChild(row3);
    formEl.appendChild(mkFG('Observações',mkTxt('pm-obs',t.observacoes||'')));

    const saveBtn=mkBtn('Salvar','#002B7F','#fff');
    saveBtn.onclick=submitTask;
    footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true));
    if(t.id){const del=mkBtn('Excluir','#FDEAEA','#D62828');del.onclick=()=>doDeleteTask(t.id);footEl.appendChild(del);}
    footEl.appendChild(saveBtn);
  }

  else if(type==='mel'){
    const m=data.mel||{};
    titleEl.textContent=m.id?'Editar Melhoria':'Nova Melhoria';
    formEl.appendChild(mkFG('Problema identificado',mkTxt('pm-prob',m.problema||'')));
    formEl.appendChild(mkFG('Sugestão',mkTxt('pm-sug',m.sugestao||'')));
    const row1=mkRow();
    row1.appendChild(mkFG('Prioridade',mkSel('pm-prio',['Alta','Média','Baixa'],m.prioridade||'Média')));
    row1.appendChild(mkFG('Impacto',mkSel('pm-imp',['Alto','Médio','Baixo'],m.impacto||'Médio')));
    formEl.appendChild(row1);
    const row2=mkRow();
    row2.appendChild(mkFG('Responsável',mkSel('pm-resp',['Coordenador','Assistente','Equipe'],m.responsavel||'Coordenador')));
    row2.appendChild(mkFG('Prazo',mkInp('pm-prazo',m.prazo||'','','date')));
    formEl.appendChild(row2);
    formEl.appendChild(mkFG('Status',mkSel('pm-status',['Identificado','Em análise','Em execução','Concluído','Descartado'],m.status||'Identificado')));

    const saveBtn=mkBtn('Salvar','#002B7F','#fff');
    saveBtn.onclick=submitMel;
    footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true));
    if(m.id){const del=mkBtn('Excluir','#FDEAEA','#D62828');del.onclick=()=>doDeleteMel(m.id);footEl.appendChild(del);}
    footEl.appendChild(saveBtn);
  }

  else if(type==='log'){
    const day=data.day;
    titleEl.textContent=`Registrar — ${fmtD(day)}`;
    formEl.appendChild(mkFG('Tipo',mkSel('pm-log-tipo',['ocorrencia','decisao','reuniao','ideia','observacao'],'ocorrencia')));
    formEl.appendChild(mkFG('Descrição',mkTxt('pm-log-txt','')));

    const saveBtn=mkBtn('Registrar','#002B7F','#fff');
    saveBtn.onclick=()=>submitLog(day);
    footEl.appendChild(mkBtn('Cancelar','transparent','#4B5563',true));
    footEl.appendChild(saveBtn);
  }

  ov.classList.add('open');
  setTimeout(()=>{
    const first=formEl.querySelector('input,textarea,select');
    if(first&&type==='task')first.focus();
  },150);
}

function modalClose(){
  document.getElementById('the-modal').classList.remove('open');
  modalType=null; modalData=null;
}

// DOM builders — no innerHTML, pure createElement
function mkEl(tag,cls,style){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(style)Object.assign(el.style,style);
  return el;
}
function mkFG(label,input){
  const fg=mkEl('div','fg');
  const lbl=mkEl('label','flbl');
  lbl.textContent=label;
  fg.appendChild(lbl);
  fg.appendChild(input);
  return fg;
}
function mkRow(){
  const d=mkEl('div','frow');
  return d;
}
function mkInp(id,val,ph='',type='text'){
  const el=mkEl('input','finp');
  el.id=id; el.type=type; el.value=val; el.placeholder=ph;
  return el;
}
function mkSel(id,opts,val){
  const el=mkEl('select','fsel');
  el.id=id;
  opts.forEach(o=>{
    const opt=document.createElement('option');
    opt.value=o; opt.textContent=o;
    if(o===val)opt.selected=true;
    el.appendChild(opt);
  });
  return el;
}
function mkTxt(id,val,ph=''){

async function submitTask(){
  const titulo=gv('pm-titulo');
  if(!titulo.trim()){toast('Informe o título','err');return;}
  const id=modalData?.task?.id;
  const item={id:id||uid(),titulo,descricao:gv('pm-desc'),data:gv('pm-data')||today(),hora:gv('pm-hora'),responsavel:gv('pm-resp')||'Coordenador',prioridade:gv('pm-prio')||'Média',status:gv('pm-status')||'Não iniciado',categoria:gv('pm-cat'),observacoes:gv('pm-obs')};
  try{
    if(id){await db.patch('tarefas',id,item);tasks=tasks.map(t=>t.id===id?{...t,...item}:t);}
    else{await db.post('tarefas',item);tasks=[item,...tasks];}
    modalClose(); render(); toast('Tarefa salva!','ok');
  }catch(e){toast('Erro ao salvar','err');}
}

async function doDeleteTask(id){

async function toggleCheck(day,sec,idx){
  if(!cs[day])cs[day]={};
  if(!cs[day][sec])cs[day][sec]={};
  const newVal=!cs[day][sec][idx];
  cs[day][sec][idx]=newVal;
  render();
  try{await db.ups('checklist_state',{id:`${day}_${sec}_${idx}`,data:day,secao:sec,indice:idx,concluido:newVal});}catch(e){}
}

async function setStars(day,n){
  if(!cs[day])cs[day]={};
  cs[day]._stars=n;
  render();
  try{await db.ups('checklist_state',{id:`${day}_stars_0`,data:day,secao:'stars',indice:n,concluido:true});}catch(e){}
  toast(`Produtividade: ${n}/5 ⭐`,'ok');
}

async function loadAll(){
  try{
    const[t,m,c,l]=await Promise.all([
      db.get('tarefas','order=criado_em.desc'),
      db.get('melhorias','order=criado_em.desc'),
      db.get('checklist_state'),
      db.get('logs','order=criado_em.desc')
    ]);
    tasks=t||[]; mels=m||[];
    cs={};
    (c||[]).forEach(r=>{
      if(!cs[r.data])cs[r.data]={};
      if(r.secao==='stars')cs[r.data]._stars=r.indice;
      else{if(!cs[r.data][r.secao])cs[r.data][r.secao]={};cs[r.data][r.secao][r.indice]=r.concluido;}
    });
    logs={};
    (l||[]).forEach(r=>{if(!logs[r.data])logs[r.data]=[];logs[r.data].push(r);});
    syncOk=true;
    // Only render if modal closed
    if(!document.getElementById('the-modal').classList.contains('open')) render();
  }catch(e){syncOk=false;}
}

function buildCtx(){
  const td=today();
  const tj=tasks.filter(t=>t.data===td);
  const at=tasks.filter(t=>t.data&&t.data<td&&t.status!=='Concluído');
  const lh=logs[td]||[];
  const ab=checks.abertura||[];
  const abDone=ab.filter((_,i)=>((cs[td]||{}).abertura||{})[i]).length;
  const ma=mels.filter(m=>m.status!=='Concluído'&&m.status!=='Descartado');
  return`DATA:${fmtDL(td)}\nTAREFAS HOJE(${tj.length}):${tj.map(t=>`[${t.status}]${t.titulo}|${t.responsavel}|${t.prioridade}`).join('/')||'Nenhuma'}\nATRASADAS(${at.length}):${at.map(t=>`${fmtD(t.data)} ${t.titulo}`).join('/')||'Nenhuma'}\nCHECKLIST:${abDone}/${ab.length}\nLOGS(${lh.length}):${lh.map(l=>`[${l.tipo}]${l.texto.slice(0,40)}`).join('/')||'Nenhum'}\nMELHORIAS(${ma.length}):${ma.slice(0,4).map(m=>`[${m.prioridade}]${(m.problema||'').slice(0,40)}`).join('/')||'Nenhuma'}`;
}

async function sendIA(msg){
  if(!msg||!msg.trim()||iaBusy)return;
  iaBusy=true;
  iaHist.push({r:'user',t:msg});
  document.getElementById('ai-inp-el')&&(document.getElementById('ai-inp-el').value='');
  renderIA();
  try{
    const messages=iaHist.slice(-8).map(m=>({role:m.r==='user'?'user':'assistant',content:m.t}));
    const r=await fetch(EDGE,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({system:`Assistente NAC, colégio Marista. Direto, sem formalidade.\n\n${buildCtx()}`,messages})});
    const d=await r.json();
    iaHist.push({r:'bot',t:d.content?.map(c=>c.text||'').join('')||'Erro.'});
  }catch(e){iaHist.push({r:'bot',t:'Erro ao conectar.'});}
  iaBusy=false;
  renderIA();
}

async function genBriefing(){
  briefingLoading=true; briefing=''; render();
  try{
    const r=await fetch(EDGE,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({system:`Assistente NAC. Dados: ${buildCtx()}`,messages:[{role:'user',content:'Briefing direto: prioridades, riscos, recomendações. Bullets. Máx 200 palavras.'}]})});
    const d=await r.json();
    briefing=d.content?.map(c=>c.text||'').join('')||'Erro.';
  }catch(e){briefing='Erro ao conectar com a IA.';}
  briefingLoading=false; render();
}

      </div>
      <div style="padding:8px;flex:1;display:flex;flex-direction:column;gap:6px">
        ${dt.map(t=>`<div onclick="modalOpen('task',{task:tasks.find(x=>x.id==='${t.id}')})" style="background:#F7F8FC;border:1px solid #E8EBF5;border-radius:6px;padding:7px 9px;cursor:pointer"><div style="font-size:12px;font-weight:600;color:${t.status==='Concluído'?'#9CA3AF':'#111827'};text-decoration:${t.status==='Concluído'?'line-through':'none'}">${esc(t.titulo)}</div>${t.hora?`<div style="font-size:10px;color:#9CA3AF;margin-top:2px">${t.hora}</div>`:''}</div>`).join('')}
      </div>
      <div onclick="modalOpen('task',{task:null,date:'${ds}'})" style="display:flex;align-items:center;gap:6px;padding:8px 10px;color:#9CA3AF;font-size:11px;font-weight:600;cursor:pointer;border-top:1px solid #E8EBF5">+ Adicionar</div>
    </div>`;
  }).join('');

  let allT=tasks.filter(t=>dates.map(d=>d.toISOString().slice(0,10)).includes(t.data));
  allT.sort((a,b)=>a.data===b.data?a.hora>b.hora?1:-1:a.data>b.data?1:-1);

  return`<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div><div style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;color:#111827">Semana</div><div style="font-size:11px;color:#9CA3AF">${s} a ${e}</div></div>
    <button class="btn sm" onclick="modalOpen('task',{task:null,date:'${td}'})">+ Nova tarefa</button>
  </div>
  <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">
    <button class="btn ghost sm" onclick="wkOff--;render()">‹ Anterior</button>
    <button class="btn ghost sm" onclick="wkOff=0;render()">Hoje</button>
    <button class="btn ghost sm" onclick="wkOff++;render()">Próxima ›</button>
  </div>
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px"><div style="display:flex;gap:10px;min-width:max-content">${dayCols}</div></div>
  <div class="card"><div class="card-head"><span class="card-title">Lista completa</span></div><div class="card-body">${allT.length?allT.map(t=>taskItemH(t,true)).join(''):'<div class="empty">Sem tarefas nesta semana</div>'}</div></div>`;
}

function renderIA(){
  const msgsEl=document.getElementById('ia-msgs-el');
  if(!msgsEl)return;
  msgsEl.innerHTML=iaHist.map(m=>`<div class="ai-msg ${m.r==='user'?'user':'bot'}">${esc(m.t).replace(/\n/g,'<br>')}</div>`).join('')+(iaBusy?'<div class="ai-msg thinking">Analisando...</div>':'');
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

function iaH(){
  const quick=[['📊 Briefing do dia','Faça um briefing do dia com prioridades, riscos e recomendações.'],['⚠️ Riscos da semana','Analise a semana e identifique riscos e prioridades.'],['🔴 Atrasadas','Quais tarefas estão atrasadas? Liste com prioridade.'],['🎯 Foco agora','Quais as 3 coisas mais importantes para focar agora?'],['💡 Melhorias','Analise as melhorias e sugira por onde começar.'],['📝 Resumo','Resuma a semana: concluído e pendente.']].map(([l,m])=>`<button class="qbtn" onclick="sendIA(${JSON.stringify(m)})">${l}</button>`).join('');
  const msgs=iaHist.map(m=>`<div class="ai-msg ${m.r==='user'?'user':'bot'}">${esc(m.t).replace(/\n/g,'<br>')}</div>`).join('')+(iaBusy?'<div class="ai-msg thinking">Analisando...</div>':'');
  return`<div style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;color:#111827;margin-bottom:4px">Assistente IA</div>
  <div class="card">
    <div style="background:#002B7F;padding:12px 14px;display:flex;align-items:center;gap:8px;border-radius:12px 12px 0 0">
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px">🤖</div>
      <div><div style="color:#fff;font-size:13px;font-weight:700">Assistente NAC</div><div style="color:rgba(255,255,255,.55);font-size:10px">Dados em tempo real</div></div>
    </div>
    <div class="ai-msgs" id="ia-msgs-el">${msgs}</div>
    <div class="ai-row">
      <textarea class="ai-inp" id="ai-inp-el" placeholder="Pergunte sobre o NAC..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendIA(this.value)}"></textarea>
      <button class="ai-send" onclick="sendIA(document.getElementById('ai-inp-el')?.value)" ${iaBusy?'disabled':''}>➤</button>
    </div>
  </div>
  <div class="card"><div class="card-head"><span class="card-title">⚡ Ações rápidas</span></div><div class="card-body">${quick}</div></div>`;
}

function melH(){
  const prioO={'Alta':0,'Média':1,'Baixa':2};
  const list=[...mels].sort((a,b)=>(prioO[a.prioridade]||1)-(prioO[b.prioridade]||1));
  const total=mels.length,emA=mels.filter(m=>m.status==='Em execução').length,conc=mels.filter(m=>m.status==='Concluído').length,alta=mels.filter(m=>m.prioridade==='Alta'&&m.status!=='Concluído').length;
  return`<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;color:#111827">Melhorias</div>
    <button class="btn sm" onclick="modalOpen('mel',{mel:null})">+ Nova</button>
  </div>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-n">${total}</div><div class="kpi-l">Total</div></div>
    <div class="kpi kamber"><div class="kpi-n">${emA}</div><div class="kpi-l">Em execução</div></div>
    <div class="kpi kgreen"><div class="kpi-n">${conc}</div><div class="kpi-l">Concluídas</div></div>
    <div class="kpi kred"><div class="kpi-n">${alta}</div><div class="kpi-l">Alta prioridade</div></div>
  </div>
  ${list.length?list.map(m=>`<div class="card" style="cursor:pointer" onclick="modalOpen('mel',{mel:mels.find(x=>x.id==='${m.id}')})"><div style="padding:12px 14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap"><div class="pdot" style="background:${pdot(m.prioridade)}"></div><span style="font-size:13px;font-weight:700;color:#111827;flex:1">${esc((m.problema||'').slice(0,70))}${(m.problema||'').length>70?'…':''}</span></div><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span class="badge ${bcls(m.prioridade)}">${esc(m.prioridade)}</span><span class="badge ${bcls(m.status)}">${esc(m.status)}</span><span style="font-size:10px;color:#9CA3AF">👤 ${esc(m.responsavel||'')}</span>${m.prazo?`<span style="font-size:10px;color:#9CA3AF">📅 ${fmtD(m.prazo)}</span>`:''}</div>${m.sugestao?`<div style="font-size:12px;color:#4B5563;line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid #E8EBF5">💬 ${esc(m.sugestao)}</div>`:''}</div></div>`).join(''):'<div class="card"><div class="empty">Nenhuma melhoria. Clique em + Nova.</div></div>'}`;
}

// ═══════════════════════════
// MAIN RENDER
// ═══════════════════════════
const NAV=[{id:'dashboard',icon:'📊',label:'Dashboard'},{id:'rotina',icon:'☀️',label:'Rotina'},{id:'semana',icon:'📅',label:'Semana'},{id:'ia',icon:'🤖',label:'IA'},{id:'melhorias',icon:'💡',label:'Melhorias'}];

function render(){
  const now=new Date();
  const dt=now.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})+' · '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  let panel='';
  if(tab==='dashboard')panel=dashH();
  else if(tab==='rotina')panel=rotinaH();
  else if(tab==='semana')panel=semanaH();
  else if(tab==='ia')panel=iaH();
  else if(tab==='melhorias')panel=melH();

  document.getElementById('app-root').innerHTML=`
  <div class="app">
    <div class="topbar">
      <button onclick="document.getElementById('sb-ov').classList.add('open')" style="background:none;border:none;font-size:22px;cursor:pointer;color:#4B5563;padding:4px;line-height:1">☰</button>
      <span style="font-family:'Montserrat',sans-serif;font-size:15px;font-weight:800;color:#002B7F">NAC</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:${syncOk?'#1A7A4A':'#D62828'}"></div>
        <span style="font-size:11px;color:#9CA3AF">${dt}</span>
      </div>
    </div>
    <div class="content">${panel}</div>
    <div class="bottom-nav">
      ${NAV.map(n=>`<button class="nav-btn${tab===n.id?' active':''}" onclick="tab='${n.id}';render()">
        <span class="nav-icon">${n.icon}</span>
        <span class="nav-label">${n.label}</span>
        ${tab===n.id?'<div class="nav-bar"></div>':''}
      </button>`).join('')}
    </div>
  </div>
  <!-- SIDEBAR -->
  <div class="sb-ov" id="sb-ov">
    <div class="sb-bg" onclick="document.getElementById('sb-ov').classList.remove('open')"></div>
    <div class="sb">
      <div class="sb-brand"><div class="sb-logo">NAC</div><div class="sb-sub">Centro de Comando</div></div>
      <nav class="sb-nav">
        ${NAV.map(n=>`<button class="sb-btn${tab===n.id?' active':''}" onclick="tab='${n.id}';document.getElementById('sb-ov').classList.remove('open');render()"><span style="font-size:16px">${n.icon}</span>${n.label}</button>`).join('')}
      </nav>
      <div class="sb-footer"><div style="display:flex;align-items:center;gap:8px;padding:8px 10px"><div style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">N</div><div><div style="font-size:12px;color:rgba(255,255,255,.7);font-weight:500">NAC · Marista</div><div style="font-size:9px;color:rgba(255,255,255,.4)">${syncOk?'Sincronizado':'Erro de conexão'}</div></div></div></div>
    </div>
  </div>`;

  // If IA tab, scroll msgs
  if(tab==='ia'){
    const el=document.getElementById('ia-msgs-el');
    if(el)el.scrollTop=el.scrollHeight;
  }
}

// ═══════════════════════════
// INIT
// ═══════════════════════════
document.getElementById('modal-close-btn').onclick=modalClose;
document.getElementById('the-modal').onclick=function(e){if(e.target===this)modalClose();};

render();
loadAll();
// Auto-refresh — only when modal closed
setInterval(()=>{
  if(!document.getElementById('the-modal').classList.contains('open')) loadAll();
},30000);
</script>
</body>
</html>
